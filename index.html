<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>FFmpeg Studio Pro - Advanced Edition</title>
    <style>
        :root { 
            --bg: #0a0a0a; --panel: #141414; --accent: #00ff88; --text: #efefef; 
            --border: #2a2a2a; --sidebar-w: 340px; --timeline-h: 280px;
            --danger: #ff4444;
        }
        body { 
            margin: 0; font-family: 'Segoe UI', system-ui, sans-serif; 
            background: var(--bg); color: var(--text); 
            display: flex; height: 100vh; overflow: hidden; user-select: none;
        }
        #sidebar { 
            width: var(--sidebar-w); 
            flex-shrink: 0; 
            background: var(--panel); 
            border-right: 1px solid var(--border); 
            display: flex; 
            flex-direction: column; 
            padding: 20px; 
            box-sizing: border-box; 
            z-index: 100;
            height: 100vh;
            overflow-y: auto;
        }
        .section-title { font-size: 12px; text-transform: uppercase; color: #666; letter-spacing: 1px; margin-bottom: 15px; margin-top: 10px;}
        
        #assets-list { 
            flex: 1; 
            overflow-y: auto; 
            margin-bottom: 20px;
            padding-right: 5px;
        }
        #assets-list::-webkit-scrollbar { width: 6px; }
        #assets-list::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }

        #main { 
            flex: 1; 
            min-width: 0; 
            display: flex; flex-direction: column; position: relative; background: #000; 
        }
        #viewport-container { 
            flex: 1; position: relative; display: flex; align-items: center; justify-content: center; 
            background: #050505; overflow: hidden; 
        }
        canvas { background: #000; display: block; cursor: default; }
        #timeline { 
            height: var(--timeline-h); background: var(--panel); 
            border-top: 1px solid var(--border); padding: 10px 12px; box-sizing: border-box;
            display: flex; flex-direction: column;
        }
        #timeline-scroll-container { 
            overflow-x: auto; 
            overflow-y: hidden;
            display: block; 
            border: 1px solid var(--border);
            position: relative;
        }
        #timeline-scroll-container::-webkit-scrollbar { height: 8px; }
        #timeline-scroll-container::-webkit-scrollbar-track { background: #111; }
        #timeline-scroll-container::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }
        #timeline-scroll-container::-webkit-scrollbar-thumb:hover { background: #444; }

        #timeline-ruler {
            position: relative; height: 25px; background: #1a1a1a;
            border-bottom: 1px solid var(--border);
            font-family: monospace; font-size: 10px; color: #888;
            width: 100%; 
        }
        .ruler-tick {
            position: absolute; top: 0; height: 100%;
            border-left: 1px solid #333; padding-left: 4px;
            display: flex; align-items: center;
        }
        .ruler-tick.major { border-left: 1px solid #555; color: #bbb; }
        #tracks-area { 
            position: relative; height: 200px; background: #0d0d0d; 
            overflow-y: auto; 
            overflow-x: visible; 
            cursor: crosshair;
        }
        .grid-line {
            position: absolute; top: 0; left: 0; 
            width: 100%; 
            height: 100%;
            background-image: linear-gradient(90deg, #1a1a1a 1px, transparent 1px);
            background-size: 20px 100%; pointer-events: none;
        }
        #playhead {
            position: absolute; top: 0; left: 0; width: 2px; 
            background: #ff3333; z-index: 50; pointer-events: none;
        }
        .btn { 
            background: var(--accent); color: #000; border: none; padding: 12px; 
            cursor: pointer; font-weight: 600; border-radius: 6px; width: 100%; 
            margin-bottom: 10px; transition: all 0.2s;
        }
        .btn:hover { filter: brightness(1.1); transform: translateY(-1px); }
        .btn-dark { background: #333; color: #fff; }
        .btn-danger { background: var(--danger); color: #fff; }
        .btn-small { padding: 4px 8px; font-size: 10px; width: auto; margin: 0; }
        
        .asset-item { 
            background: #1f1f1f; padding: 12px; margin-bottom: 8px; 
            border-radius: 6px; cursor: pointer; border-left: 3px solid transparent; 
            font-size: 13px; transition: 0.2s; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .asset-item.active { border-left-color: var(--accent); background: #2a2a2a; }
        
        .prop-group { margin-bottom: 12px; }
        label { display: block; font-size: 11px; color: #888; margin-bottom: 4px; }
        input, select { 
            width: 100%; background: #000; border: 1px solid var(--border); 
            color: #fff; padding: 6px; box-sizing: border-box; border-radius: 4px; 
            font-size: 12px;
        }
        select { cursor: pointer; }
        .checkbox-row { display: flex; align-items: center; gap: 8px; cursor: pointer; margin-bottom: 8px; }
        .checkbox-row input[type="checkbox"] { width: auto; margin: 0; accent-color: var(--accent); cursor: pointer; }
        .checkbox-row span { font-size: 12px; color: var(--text); }
        .prop-row { display: flex; gap: 10px; }
        
        #prompt-box {
            position: absolute; bottom: 320px; left: 20px; right: 20px;
            background: rgba(0,0,0,0.9); border: 1px solid var(--accent);
            border-radius: 8px; z-index: 1000; padding: 15px;
        }
        #prompt-text { 
            font-family: 'Consolas', monospace; font-size: 12px; color: var(--accent); 
            white-space: pre-wrap; word-break: break-all; max-height: 100px; 
            overflow-y: auto; margin-bottom: 10px;
        }
        .copy-btn { width: auto; padding: 5px 15px; font-size: 11px; margin: 0; }
        .clip-block {
            position: absolute; height: 26px; background: var(--accent);
            color: #000; font-size: 11px; font-weight: bold; border-radius: 4px;
            cursor: grab; display: flex; align-items: center; padding: 0 10px;
            box-sizing: border-box; overflow: hidden; z-index: 10;
        }
        .clip-block.text-type { background: #00ccff; }
        .clip-block.image-type { background: #ffcc00; }
        .clip-block.audio-type { background: #cc44ff; color: #fff; }
        .clip-block.selected {
            outline: 2px solid #fff;
            outline-offset: -2px;
        }
        .resizer {
            position: absolute; right: 0; top: 0; width: 12px; height: 100%;
            cursor: col-resize; background: rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>

    <div id="sidebar">
        <div class="section-title">Media Assets</div>
        <input type="file" id="file-input" multiple accept="video/*" style="display:none" onchange="handleFiles(this.files); this.value=''">
        <input type="file" id="image-input" multiple accept="image/*" style="display:none" onchange="handleImages(this.files); this.value=''">
        <input type="file" id="audio-input" multiple accept="audio/*" style="display:none" onchange="handleAudios(this.files); this.value=''">
        
        <button class="btn" onclick="document.getElementById('file-input').click()">+ Import Video</button>
        <button class="btn" onclick="document.getElementById('image-input').click()">+ Import Image</button>
        <button class="btn" style="background:#cc44ff; color:#fff;" onclick="document.getElementById('audio-input').click()">+ Import MP3 / Audio</button>
        <button class="btn btn-dark" onclick="addTextClip()">+ Add Text Overlay</button>
        
        <div style="display: flex; gap: 8px; margin-bottom: 20px;">
            <button class="btn btn-dark" style="flex:1" onclick="togglePlayback()">▶ Play/Pause</button>
        </div>

        <div id="assets-list"></div>
        
        <div style="padding-top: 20px; border-top: 1px solid var(--border);">
            <div class="section-title">Properties</div>
            <div id="props-panel" style="display:none;">
                <div id="media-props">
                    <div class="prop-group">
                        <label>File Path</label>
                        <input type="text" id="p-path" oninput="updateClip()">
                    </div>
                    <div class="prop-group" id="srcstart-group">
                        <label>Start in Source (s)</label>
                        <input type="number" id="p-srcstart" step="0.1" oninput="updateClip()">
                    </div>
                    <div class="prop-row">
                        <div class="prop-group">
                            <label>Scale (%)</label>
                            <input type="number" id="p-scale" step="0.01" oninput="updateClip()">
                        </div>
                        <div class="prop-group" id="vol-group">
                            <label>Volume (0-2)</label>
                            <input type="number" id="p-volume" step="0.1" oninput="updateClip()">
                        </div>
                    </div>
                    <div class="prop-group" id="speed-group">
                        <label>Speed (0.25x – 4x)</label>
                        <input type="number" id="p-speed" step="0.05" min="0.25" max="4" oninput="updateClip()">
                        <div style="display:flex; gap:6px; margin-top:6px;">
                            <button class="btn btn-dark btn-small" style="flex:1;" onclick="setClipSpeed(0.5)">0.5x</button>
                            <button class="btn btn-dark btn-small" style="flex:1;" onclick="setClipSpeed(1)">1x</button>
                            <button class="btn btn-dark btn-small" style="flex:1;" onclick="setClipSpeed(1.5)">1.5x</button>
                            <button class="btn btn-dark btn-small" style="flex:1;" onclick="setClipSpeed(2)">2x</button>
                        </div>
                    </div>
                    <div class="prop-group" id="normalize-group">
                        <label class="checkbox-row">
                            <input type="checkbox" id="p-normalize" onchange="updateClip()">
                            <span>Normalize Audio (Loudness)</span>
                        </label>
                        <label>Target LUFS</label>
                        <select id="p-normalize-lufs" onchange="updateClip()">
                            <option value="-14">-14 LUFS (Streaming: YouTube/Spotify)</option>
                            <option value="-16">-16 LUFS (Podcast)</option>
                            <option value="-18">-18 LUFS</option>
                            <option value="-23">-23 LUFS (Broadcast EBU R128)</option>
                        </select>
                    </div>
                    <div class="prop-group">
                        <label>Fit Mode</label>
                        <div style="display:flex; gap:6px;">
                            <button id="btn-fit" class="btn btn-dark btn-small" style="flex:1; padding:6px 4px; font-size:11px;" onclick="setFitMode('fit')">⬜ Fit</button>
                            <button id="btn-stretch" class="btn btn-dark btn-small" style="flex:1; padding:6px 4px; font-size:11px;" onclick="setFitMode('stretch')">⬛ Stretch</button>
                        </div>
                    </div>
                    <div class="prop-group">
                        <label>Rotate (°)</label>
                        <div style="display:flex; gap:6px; align-items:center;">
                            <input type="number" id="p-rotate" step="1" min="-360" max="360" oninput="updateClip()" style="flex:1;">
                            <button class="btn btn-dark btn-small" onclick="rotateClipBy(-90)" title="−90°">↺ −90</button>
                            <button class="btn btn-dark btn-small" onclick="rotateClipBy(90)" title="+90°">↻ +90</button>
                        </div>
                    </div>
                    <div class="prop-group" id="crop-group">
                        <label>Crop (px, relative to native size)</label>
                        <div class="prop-row">
                            <div class="prop-group">
                                <label>Crop X</label>
                                <input type="number" id="p-crop-x" step="1" min="0" oninput="updateClip()">
                            </div>
                            <div class="prop-group">
                                <label>Crop Y</label>
                                <input type="number" id="p-crop-y" step="1" min="0" oninput="updateClip()">
                            </div>
                        </div>
                        <div class="prop-row">
                            <div class="prop-group">
                                <label>Crop W</label>
                                <input type="number" id="p-crop-w" step="1" min="1" oninput="updateClip()">
                            </div>
                            <div class="prop-group">
                                <label>Crop H</label>
                                <input type="number" id="p-crop-h" step="1" min="1" oninput="updateClip()">
                            </div>
                        </div>
                        <button class="btn btn-dark btn-small" style="width:100%; margin-top:4px;" onclick="resetCrop()">↺ Reset Crop</button>
                    </div>
                </div>

                <div id="audio-props" style="display:none;">
                    <div class="prop-group">
                        <label>File Path</label>
                        <input type="text" id="p-audio-path" oninput="updateClip()">
                    </div>
                    <div class="prop-row">
                        <div class="prop-group">
                            <label>Volume (0-2)</label>
                            <input type="number" id="p-audio-volume" step="0.1" min="0" max="2" oninput="updateClip()">
                        </div>
                        <div class="prop-group">
                            <label>Start in Source (s)</label>
                            <input type="number" id="p-audio-srcstart" step="0.1" min="0" oninput="updateClip()">
                        </div>
                    </div>
                    <div class="prop-row">
                        <div class="prop-group">
                            <label>Fade In (s)</label>
                            <input type="number" id="p-audio-fadein" step="0.1" min="0" oninput="updateClip()">
                        </div>
                        <div class="prop-group">
                            <label>Fade Out (s)</label>
                            <input type="number" id="p-audio-fadeout" step="0.1" min="0" oninput="updateClip()">
                        </div>
                    </div>
                    <div class="prop-group">
                        <label class="checkbox-row">
                            <input type="checkbox" id="p-audio-normalize" onchange="updateClip()">
                            <span>Normalize Audio (Loudness)</span>
                        </label>
                        <label>Target LUFS</label>
                        <select id="p-audio-normalize-lufs" onchange="updateClip()">
                            <option value="-14">-14 LUFS (Streaming: YouTube/Spotify)</option>
                            <option value="-16">-16 LUFS (Podcast)</option>
                            <option value="-18">-18 LUFS</option>
                            <option value="-23">-23 LUFS (Broadcast EBU R128)</option>
                        </select>
                    </div>
                </div>

                <div id="text-props" style="display:none;">
                    <div class="prop-group">
                        <label>Text Content</label>
                        <input type="text" id="p-text-content" oninput="updateClip()">
                    </div>
                    <div class="prop-group">
                        <label>Font File Path</label>
                        <input type="text" id="p-text-font" oninput="updateClip()">
                    </div>
                    <div class="prop-row">
                        <div class="prop-group">
                            <label>Font Size (px)</label>
                            <input type="number" id="p-text-size" step="1" oninput="updateClip()">
                        </div>
                        <div class="prop-group">
                            <label>Color (Hex)</label>
                            <input type="text" id="p-text-color" oninput="updateClip()">
                        </div>
                    </div>
                </div>

                <div class="prop-group">
                    <label>Duration (s)</label>
                    <input type="number" id="p-duration" step="0.1" oninput="updateClip()">
                </div>
                <div class="prop-row">
                    <div class="prop-group">
                        <label>Pos X (px)</label>
                        <input type="number" id="p-x" step="1" oninput="updateClip()">
                    </div>
                    <div class="prop-group">
                        <label>Pos Y (px)</label>
                        <input type="number" id="p-y" step="1" oninput="updateClip()">
                    </div>
                </div>
                <div id="fade-props" class="prop-row">
                    <div class="prop-group">
                        <label>Fade In (s)</label>
                        <input type="number" id="p-fadein" step="0.1" oninput="updateClip()">
                    </div>
                    <div class="prop-group">
                        <label>Fade Out (s)</label>
                        <input type="number" id="p-fadeout" step="0.1" oninput="updateClip()">
                    </div>
                </div>
                <div style="display: flex; gap: 8px; margin-top: 20px;">
                    <button class="btn btn-dark btn-small" onclick="moveLayer(-1)">⬇ Lower</button>
                    <button class="btn btn-dark btn-small" onclick="moveLayer(1)">⬆ Raise</button>
                    <button class="btn btn-dark btn-small" onclick="splitClip()">Split</button>
                </div>
                <button class="btn btn-danger" style="margin-top:10px" onclick="deleteClip()">Delete Clip</button>
            </div>
        </div>
    </div>

    <div id="main">
        <div id="viewport-container"></div>
        <div id="prompt-box">
            <div id="prompt-text">Import videos or add text to generate command...</div>
            <label class="checkbox-row" style="margin-bottom:10px;">
                <input type="checkbox" id="export-60fps" onchange="setExport60fps(this.checked)">
                <span>Exportar em 60 FPS (opcional)</span>
            </label>
            <button class="btn copy-btn" onclick="copyPrompt()">Copy Command</button>
        </div>
        <div id="timeline">
            <div class="section-title">Timeline (20px = 1s) | Click to Seek</div>
            <div id="timeline-scroll-container">
                <div id="timeline-ruler"></div>
                <div id="tracks-area">
                    <div class="grid-line"></div>
                    <div id="playhead"></div>
                </div>
            </div>
        </div>
    </div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
    </script>

    <script type="module">
        import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';

        window.addEventListener('keydown', (e) => {
            if (document.activeElement.tagName === 'INPUT') return;

            if (e.key.toLowerCase() === 'm') {
                const box = document.getElementById('prompt-box');
                box.style.display = (box.style.display === 'none') ? 'block' : 'none';
            }

            if (e.code === 'Space' || e.key === ' ') {
                e.preventDefault();
                window.togglePlayback();
            }

            if (e.key.toLowerCase() === 's') {
                window.splitClip();
            }

            // D — split e substitui: deleta o primeiro pedaço e o segundo assume
            // sua posição na timeline e sua camada (z-order)
            if (e.key.toLowerCase() === 'd') {
                window.splitAndReplaceClip();
            }

            if (e.key === 'Delete' || e.key === 'Backspace') {
                window.deleteClip();
            }

            // Ctrl+C — copy selected clip
            if (e.key.toLowerCase() === 'c' && (e.ctrlKey || e.metaKey)) {
                window.copyClip();
            }

            // Ctrl+V — paste clipboard clip at current playhead position
            if (e.key.toLowerCase() === 'v' && (e.ctrlKey || e.metaKey)) {
                e.preventDefault();
                window.pasteClip();
            }
        });

        const PROJECT = { w: 1920, h: 1080, aspect: 16/9, pxPerSec: 20 };
        let state = { clips: [], selectedIdx: null, isPlaying: false, time: 0, export60fps: false };
        let clipboard = null; // stores a deep copy of the last copied clip

        const scene = new THREE.Scene();
        const camera = new THREE.OrthographicCamera(-PROJECT.w/2, PROJECT.w/2, PROJECT.h/2, -PROJECT.h/2, 0.1, 1000);
        camera.position.z = 10;

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        const viewport = document.getElementById('viewport-container');
        viewport.appendChild(renderer.domElement);

        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        function fitCanvas() {
            const cw = viewport.clientWidth, ch = viewport.clientHeight;
            let w = cw, h = cw / PROJECT.aspect;
            if (h > ch) { h = ch; w = ch * PROJECT.aspect; }
            renderer.setSize(w, h);
        }
        window.addEventListener('resize', fitCanvas);
        fitCanvas();

        scene.add(new THREE.Mesh(new THREE.PlaneGeometry(PROJECT.w, PROJECT.h), new THREE.MeshBasicMaterial({ color: 0x000000 })));

        const handleGeometry = new THREE.PlaneGeometry(20, 20);
        const handleMaterial = new THREE.MeshBasicMaterial({ color: 0x00ff88 });
        const handleMesh = new THREE.Mesh(handleGeometry, handleMaterial);
        handleMesh.visible = false;
        scene.add(handleMesh);

        function updateLayering() {
            state.clips.forEach((clip, i) => {
                clip.mesh.position.z = i * 0.1 + 1;
            });
        }

        function calculateOpacity(clip) {
            const relativeTime = state.time - clip.timelineStart;
            if (relativeTime < 0 || relativeTime > clip.duration) return 0;
            let opacity = 1.0;
            if (clip.fadeIn > 0 && relativeTime < clip.fadeIn) {
                opacity = relativeTime / clip.fadeIn;
            } else if (clip.fadeOut > 0 && relativeTime > (clip.duration - clip.fadeOut)) {
                const timeIntoFadeOut = relativeTime - (clip.duration - clip.fadeOut);
                opacity = 1.0 - (timeIntoFadeOut / clip.fadeOut);
            }
            return Math.max(0, Math.min(1, opacity));
        }

        function createTextTexture(text, size, color) {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');

            // Garante valores mínimos válidos para não gerar canvas de tamanho 0
            const safeText = (text && text.length > 0) ? text : ' ';
            const safeSize = (size && size > 0) ? size : 1;
            const safeColor = color || '#FFFFFF';
            
            // 1. Definir fonte primeiro para medir o texto
            ctx.font = `bold ${safeSize}px Arial`;
            const metrics = ctx.measureText(safeText);
            
            // 2. Definir tamanho do canvas com uma folga (padding) 
            // para a borda não ser cortada nas extremidades
            const padding = 10; 
            canvas.width = Math.max(1, Math.ceil(metrics.width) + padding * 2);
            canvas.height = Math.max(1, Math.ceil(safeSize * 1.5));
            
            // 3. Re-configurar a fonte e alinhamentos ANTES de desenhar
            ctx.font = `bold ${safeSize}px Arial`;
            ctx.textBaseline = 'middle';
            ctx.textAlign = 'left';

            // Coordenadas fixas para ambos (X = padding, Y = centro do canvas)
            const x = padding;
            const y = canvas.height / 2;

            // 4. Desenhar a BORDA primeiro
            ctx.strokeStyle = 'black';
            ctx.lineWidth = 3;
            ctx.lineJoin = 'round';
            ctx.strokeText(safeText, x, y);

            // 5. Desenhar o PREENCHIMENTO por cima da borda
            ctx.fillStyle = safeColor;
            ctx.fillText(safeText, x, y);

            const tex = new THREE.CanvasTexture(canvas);
            return tex;
        }

        function computeGeometry(nativeW, nativeH, fitMode) {
            if (fitMode === 'stretch') {
                return new THREE.PlaneGeometry(PROJECT.w, PROJECT.h);
            }
            // 'fit': scale to fit inside canvas keeping native aspect ratio
            const s = Math.min(PROJECT.w / nativeW, PROJECT.h / nativeH);
            return new THREE.PlaneGeometry(nativeW * s, nativeH * s);
        }

        window.setFitMode = function(mode) {
            if (state.selectedIdx === null) return;
            const clip = state.clips[state.selectedIdx];
            clip.fitMode = mode;
            clip.mesh.geometry = computeGeometry(clip.nativeW, clip.nativeH, mode);
            const btnFit = document.getElementById('btn-fit');
            const btnStretch = document.getElementById('btn-stretch');
            btnFit.style.background = mode === 'fit' ? 'var(--accent)' : '#333';
            btnFit.style.color = mode === 'fit' ? '#000' : '#fff';
            btnStretch.style.background = mode === 'stretch' ? 'var(--accent)' : '#333';
            btnStretch.style.color = mode === 'stretch' ? '#000' : '#fff';
            generateFFmpeg();
        };

        window.rotateClipBy = function(deg) {
            if (state.selectedIdx === null) return;
            const clip = state.clips[state.selectedIdx];
            clip.rotate = ((clip.rotate || 0) + deg + 360) % 360;
            clip.mesh.rotation.z = -clip.rotate * Math.PI / 180;
            document.getElementById('p-rotate').value = clip.rotate;
            generateFFmpeg();
        };

        // Define a velocidade de reprodução do clipe selecionado (0.5x, 1x, 1.5x, 2x, etc.)
        // Mantém a duração do clipe na timeline, apenas muda o ritmo do conteúdo.
        window.setClipSpeed = function(speed) {
            if (state.selectedIdx === null) return;
            const clip = state.clips[state.selectedIdx];
            if (clip.type !== 'video') return;
            clip.speed = Math.max(0.25, Math.min(4, speed));
            clip.video.playbackRate = clip.speed;
            document.getElementById('p-speed').value = clip.speed;
            generateFFmpeg();
        };

        window.resetCrop = function() {
            if (state.selectedIdx === null) return;
            const clip = state.clips[state.selectedIdx];
            clip.cropX = 0; clip.cropY = 0; clip.cropW = null; clip.cropH = null;
            document.getElementById('p-crop-x').value = 0;
            document.getElementById('p-crop-y').value = 0;
            document.getElementById('p-crop-w').value = clip.nativeW || '';
            document.getElementById('p-crop-h').value = clip.nativeH || '';
            clip.mesh.geometry = computeGeometry(clip.nativeW, clip.nativeH, clip.fitMode);
            applyCropUV(clip);
            generateFFmpeg();
        };

        function applyCropUV(clip) {
            const nW = clip.nativeW || PROJECT.w;
            const nH = clip.nativeH || PROJECT.h;
            const cx = clip.cropX || 0;
            const cy = clip.cropY || 0;
            const cw = clip.cropW || nW;
            const ch = clip.cropH || nH;
            const tex = clip.texture;
            if (!tex) return;
            // In Three.js UV: x goes left→right, y goes bottom→top
            // cropY is from the top of the image, so we flip it
            tex.repeat.set(cw / nW, ch / nH);
            tex.offset.set(cx / nW, 1 - (cy / nH) - (ch / nH));
            tex.needsUpdate = true;
        }

        // Detecta se o arquivo de vídeo possui trilha de áudio.
        // Método principal: video.captureStream()/mozCaptureStream() — suportado em Chrome,
        // Firefox e Edge — gera um MediaStream a partir do elemento, e podemos checar
        // stream.getAudioTracks().length diretamente, sem precisar tocar o vídeo.
        // Fallbacks (navegadores mais antigos/Safari): video.mozHasAudio, video.audioTracks,
        // e por último webkitAudioDecodedByteCount (precisa decodificar alguns frames).
        // Roda automaticamente no import; o resultado (clip.hasAudio) é usado direto pelo
        // gerador de comando FFmpeg, sem necessidade de nenhuma ação do usuário.
        function detectHasAudio(video, clip) {
            const applyResult = (hasAudio) => {
                clip.hasAudio = hasAudio;
                generateFFmpeg();
            };

            const captureStreamFn = video.captureStream || video.mozCaptureStream;
            if (typeof captureStreamFn === 'function') {
                try {
                    const stream = captureStreamFn.call(video);
                    // Pequeno delay para garantir que o navegador já populou as tracks do stream
                    // a partir dos metadados do container.
                    setTimeout(() => {
                        const audioTracks = stream.getAudioTracks();
                        applyResult(audioTracks.length > 0);
                        stream.getTracks().forEach(t => t.stop());
                    }, 50);
                    return;
                } catch (e) {
                    // Cross-origin sem CORS ou outro erro: cai para os fallbacks abaixo
                }
            }

            if (typeof video.mozHasAudio !== 'undefined') {
                applyResult(!!video.mozHasAudio);
                return;
            }
            if (video.audioTracks && typeof video.audioTracks.length === 'number') {
                applyResult(video.audioTracks.length > 0);
                return;
            }
            if ('webkitAudioDecodedByteCount' in video) {
                const wasMuted = video.muted;
                video.muted = true;
                const finish = () => {
                    applyResult((video.webkitAudioDecodedByteCount || 0) > 0);
                    video.pause();
                    video.muted = wasMuted;
                    video.currentTime = clip.sourceStart || 0;
                };
                video.play().then(() => {
                    setTimeout(finish, 250);
                }).catch(() => {
                    // Autoplay bloqueado: assume hasAudio=true por padrão (assunção mais segura)
                    video.muted = wasMuted;
                    applyResult(true);
                });
                return;
            }
            // Nenhuma API disponível: assume hasAudio=true por padrão.
            applyResult(true);
        }

        let activeClip = null; 
        let isDragging = false; 
        let isResizing = false; 
        let isViewportDragging = false; 
        let isViewportResizing = false; 
        let viewportActiveClip = null; 
        let dragOffset = 0;

        const trackArea = document.getElementById('tracks-area');

        renderer.domElement.addEventListener('mousedown', e => {
            const rect = renderer.domElement.getBoundingClientRect();
            mouse.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
            mouse.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);
            const handleIntersect = raycaster.intersectObject(handleMesh);
            if (handleIntersect.length > 0 && viewportActiveClip) {
                isViewportResizing = true;
                e.preventDefault();
                return;
            }
            const intersects = raycaster.intersectObjects(state.clips.map(c => c.mesh));
            if (intersects.length > 0) {
                let hitMesh = (state.selectedIdx !== null && intersects.find(item => item.object === state.clips[state.selectedIdx].mesh)) 
                    ? state.clips[state.selectedIdx].mesh : intersects[0].object;
                viewportActiveClip = state.clips.find(c => c.mesh === hitMesh);
                isViewportDragging = true;
                selectClip(state.clips.indexOf(viewportActiveClip));
                renderer.domElement.style.cursor = 'grabbing';
                e.preventDefault();
            }
        });

        trackArea.addEventListener('mousedown', e => {
            const rect = trackArea.getBoundingClientRect();
            if (e.target.classList.contains('resizer')) {
                isResizing = true;
                activeClip = state.clips.find(c => c.id == e.target.dataset.id);
                e.stopPropagation(); return;
            }
            if (e.target.classList.contains('clip-block')) {
                isDragging = true;
                const id = e.target.dataset.id;
                activeClip = state.clips.find(c => c.id == id);
                dragOffset = e.clientX - (rect.left + activeClip.timelineStart * PROJECT.pxPerSec);
                selectClip(state.clips.indexOf(activeClip)); return;
            }
            state.time = (e.clientX - rect.left) / PROJECT.pxPerSec;
            updatePlayhead();
            syncVideos();
        });

        window.addEventListener('mousemove', e => {
            if (isViewportResizing && viewportActiveClip) {
                const rect = renderer.domElement.getBoundingClientRect();
                const mouseX = ((e.clientX - rect.left) / rect.width) * 2 - 1;
                const mouseY = -((e.clientY - rect.top) / rect.height) * 2 + 1;
                const worldX = mouseX * (PROJECT.w / 2);
                const worldY = mouseY * (PROJECT.h / 2);
                const dx = worldX - viewportActiveClip.mesh.position.x;
                const dy = worldY - viewportActiveClip.mesh.position.y;
                const dist = Math.sqrt(dx*dx + dy*dy);
                const newScale = dist / (PROJECT.w / 2 * 0.707); 
                viewportActiveClip.scale = Math.max(0.1, newScale);
                viewportActiveClip.mesh.scale.set(viewportActiveClip.scale, viewportActiveClip.scale, 1);
                document.getElementById('p-scale').value = viewportActiveClip.scale.toFixed(2);
                // REMOVIDO generateFFmpeg() daqui para economizar CPU
                return;
            }
            if (isViewportDragging && viewportActiveClip) {
                const rect = renderer.domElement.getBoundingClientRect();
                const deltaX = e.movementX * (PROJECT.w / rect.width);
                const deltaY = e.movementY * (PROJECT.h / rect.height);
                viewportActiveClip.mesh.position.x -= deltaX;
                viewportActiveClip.mesh.position.y += deltaY;
                document.getElementById('p-x').value = Math.round(viewportActiveClip.mesh.position.x);
                document.getElementById('p-y').value = Math.round(viewportActiveClip.mesh.position.y);
                // REMOVIDO generateFFmpeg() daqui para economizar CPU
                return;
            }
            if (!activeClip) return;
            const rect = trackArea.getBoundingClientRect();
            const tolerance = 0.2; 

            if (isDragging) {
                let rawStart = (e.clientX - rect.left - dragOffset) / PROJECT.pxPerSec;
                let snapTarget = null;

                state.clips.forEach(c => {
                    if (c === activeClip) return;
                    const start = c.timelineStart;
                    const end = c.timelineStart + c.duration;
                    if (Math.abs(rawStart - end) < tolerance) snapTarget = end;
                    else if (Math.abs(rawStart - start) < tolerance) snapTarget = start;
                });

                if (snapTarget === null && Math.abs(rawStart - state.time) < tolerance) {
                    snapTarget = state.time;
                }

                activeClip.timelineStart = snapTarget !== null ? snapTarget : Math.max(0, rawStart);
            } else if (isResizing) {
                let rawEnd = (e.clientX - rect.left) / PROJECT.pxPerSec;
                let snapEnd = null;

                state.clips.forEach(c => {
                    if (c === activeClip) return;
                    const start = c.timelineStart;
                    const end = c.timelineStart + c.duration;
                    if (Math.abs(rawEnd - end) < tolerance) snapEnd = end;
                    else if (Math.abs(rawEnd - start) < tolerance) snapEnd = start;
                });

                if (snapEnd === null && Math.abs(rawEnd - state.time) < tolerance) {
                    snapEnd = state.time;
                }

                const finalEnd = snapEnd !== null ? snapEnd : rawEnd;
                activeClip.duration = Math.max(0.1, finalEnd - activeClip.timelineStart);
            }
            if (isDragging || isResizing) { syncUI(); } // REMOVIDO generateFFmpeg() daqui
        });

        window.updateClip = function() {

                const val = document.getElementById(id).value;

                if (yVal !== "") clip.mesh.position.y = parseFloat(yVal);

                if(clip.type === 'video' || clip.type === 'image') {

                    if (scaleVal !== "") {

                    // Rotate
                    const rotVal = document.getElementById('p-rotate').value;
                    if (rotVal !== "") {

                        clip.mesh.rotation.z = -clip.rotate * Math.PI / 180;

                    // Crop
                    const cxVal = document.getElementById('p-crop-x').value;
                    const cyVal = document.getElementById('p-crop-y').value;
                    const cwVal = document.getElementById('p-crop-w').value;
                    const chVal = document.getElementById('p-crop-h').value;
                    clip.cropX = cxVal !== "" ? parseFloat(cxVal) : 0;
                    clip.cropY = cyVal !== "" ? parseFloat(cyVal) : 0;
                    clip.cropW = cwVal !== "" ? parseFloat(cwVal) : null;
                    clip.cropH = chVal !== "" ? parseFloat(chVal) : null;
                    // Update geometry to preview crop aspect ratio
                    const cw = clip.cropW || clip.nativeW || PROJECT.w;
                    const ch = clip.cropH || clip.nativeH || PROJECT.h;
                    if (cw > 0 && ch > 0) {
                        const s = Math.min(PROJECT.w / cw, PROJECT.h / ch);
                        clip.mesh.geometry = new THREE.PlaneGeometry(cw * s, ch * s);
                        // Update UV to show only the cropped region
                        applyCropUV(clip);

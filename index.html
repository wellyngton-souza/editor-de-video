        // Núcleo do split: corta o clipe selecionado no playhead e retorna as duas partes.
        // Não atualiza UI/seleção/ffmpeg — isso é responsabilidade de quem chama.
        function performSplit() {
            if (state.selectedIdx === null) return null;
            const clip = state.clips[state.selectedIdx];
            if (state.time > clip.timelineStart && state.time < (clip.timelineStart + clip.duration)) {
                const originalStart = clip.timelineStart;
                const splitTime = state.time;
                const offsetFromStart = splitTime - clip.timelineStart;
                const originalDuration = clip.duration;
                clip.duration = offsetFromStart;
                const newClipDuration = originalDuration - clip.duration;
                
                let newMesh;
                let secondClip;
                if (clip.type === 'video') {
                    const video = document.createElement('video');
                    video.src = clip.video.src;
                    video.muted = false; video.loop = true;
                    const tex = new THREE.VideoTexture(video);
                    // Use crop-aware geometry (same logic as updateClip)
                    const vcw = clip.cropW || clip.nativeW;
                    const vch = clip.cropH || clip.nativeH;
                    const vcropScale = Math.min(PROJECT.w / vcw, PROJECT.h / vch);
                    const vCropGeom = new THREE.PlaneGeometry(vcw * vcropScale, vch * vcropScale);
                    newMesh = new THREE.Mesh(vCropGeom, new THREE.MeshBasicMaterial({ map: tex, side: THREE.DoubleSide, transparent: true }));
                    newMesh.visible = false;
                    newMesh.position.set(clip.mesh.position.x, clip.mesh.position.y, 0);
                    newMesh.scale.set(clip.scale, clip.scale, 1);
                    newMesh.rotation.z = -(clip.rotate || 0) * Math.PI / 180;
                    scene.add(newMesh);
                    const newVideoClip = {
                        id: Date.now() + Math.random(), type: 'video', path: clip.path,
                        timelineStart: splitTime, sourceStart: clip.sourceStart + offsetFromStart * (clip.speed || 1),
                        duration: newClipDuration, scale: clip.scale, volume: clip.volume, speed: clip.speed || 1,
                        hasAudio: clip.hasAudio !== false,
                        fadeIn: 0, fadeOut: clip.fadeOut,
                        normalize: clip.normalize || false, normalizeLufs: clip.normalizeLufs ?? -14,
                        fitMode: clip.fitMode, nativeW: clip.nativeW, nativeH: clip.nativeH,
                        rotate: clip.rotate || 0,
                        cropX: clip.cropX || 0, cropY: clip.cropY || 0, cropW: clip.cropW || null, cropH: clip.cropH || null,
                        mesh: newMesh, video, texture: tex
                    };
                    state.clips.push(newVideoClip);
                    // Apply crop UV so the new clip shows the same cropped region
                    applyCropUV(newVideoClip);
                    video.addEventListener('loadedmetadata', () => { video.playbackRate = newVideoClip.speed || 1; }, { once: true });
                    secondClip = newVideoClip;
                } else if (clip.type === 'image') {
                    // Clone the texture so each clip has independent UV (offset/repeat) state
                    const tex = clip.texture.clone();
                    tex.needsUpdate = true;
                    // Use crop-aware geometry (same logic as updateClip)
                    const cw = clip.cropW || clip.nativeW;
                    const ch = clip.cropH || clip.nativeH;
                    const cropScale = Math.min(PROJECT.w / cw, PROJECT.h / ch);
                    const cropGeom = new THREE.PlaneGeometry(cw * cropScale, ch * cropScale);
                    newMesh = new THREE.Mesh(cropGeom, new THREE.MeshBasicMaterial({ map: tex, side: THREE.DoubleSide, transparent: true }));
                    newMesh.visible = false;
                    newMesh.position.set(clip.mesh.position.x, clip.mesh.position.y, 0);
                    newMesh.scale.set(clip.scale, clip.scale, 1);
                    newMesh.rotation.z = -(clip.rotate || 0) * Math.PI / 180;
                    scene.add(newMesh);
                    const newImageClip = {
                        id: Date.now() + Math.random(), type: 'image', path: clip.path,
                        timelineStart: splitTime, duration: newClipDuration, scale: clip.scale,
                        fadeIn: 0, fadeOut: clip.fadeOut,
                        fitMode: clip.fitMode, nativeW: clip.nativeW, nativeH: clip.nativeH,
                        rotate: clip.rotate || 0,
                        cropX: clip.cropX || 0, cropY: clip.cropY || 0, cropW: clip.cropW || null, cropH: clip.cropH || null,
                        mesh: newMesh, texture: tex
                    };
                    state.clips.push(newImageClip);
                    // Apply crop UV so the new clip shows the same cropped region
                    applyCropUV(newImageClip);
                    secondClip = newImageClip;
                } else if (clip.type === 'audio') {
                    const newAudio = document.createElement('audio');
                    newAudio.src = clip.audio.src;
                    const newAudioClip = {
                        id: Date.now() + Math.random(), type: 'audio', path: clip.path,
                        timelineStart: splitTime,
                        sourceStart: clip.sourceStart + offsetFromStart,
                        duration: newClipDuration,
                        volume: clip.volume,
                        fadeIn: 0, fadeOut: clip.fadeOut,
                        normalize: clip.normalize || false, normalizeLufs: clip.normalizeLufs ?? -14,
                        audio: newAudio,
                        mesh: { position: { x: 0, y: 0, z: 0 }, visible: false, scale: { set: () => {} } }
                    };
                    state.clips.push(newAudioClip);
                    secondClip = newAudioClip;
                } else {
                    const tex = createTextTexture(clip.text, clip.fontSize, clip.textColor);
                    newMesh = new THREE.Mesh(new THREE.PlaneGeometry(tex.image.width, tex.image.height), new THREE.MeshBasicMaterial({ map: tex, transparent: true, side: THREE.DoubleSide }));
                    newMesh.visible = false;
                    newMesh.position.set(clip.mesh.position.x, clip.mesh.position.y, 0);
                    newMesh.rotation.z = clip.mesh.rotation.z;
                    scene.add(newMesh);
                    const newTextClip = {
                        id: Date.now() + Math.random(), type: 'text', text: clip.text,
                        fontSize: clip.fontSize, textColor: clip.textColor, fontPath: clip.fontPath,
                        timelineStart: splitTime, duration: newClipDuration, fadeIn: 0, fadeOut: clip.fadeOut, mesh: newMesh, texture: tex
                    };
                    state.clips.push(newTextClip);
                    secondClip = newTextClip;
                }

                return { firstClip: clip, secondClip, originalStart };
            }
            return null;
        }

        window.splitClip = function() {
            const result = performSplit();
            if (!result) return;
            const newIndex = state.clips.length - 1;
            selectClip(newIndex);

            updateLayering();
            syncUI();
            generateFFmpeg();
        };

        // D — corta o clipe selecionado no playhead, deleta o primeiro pedaço,
        // e o segundo pedaço assume a posição na timeline E a camada (índice/z-order)
        // que o primeiro pedaço ocupava.
        window.splitAndReplaceClip = function() {
            const idx = state.selectedIdx;
            const result = performSplit();
            if (!result) return;
            const { firstClip, secondClip, originalStart } = result;

            // Libera os recursos do primeiro pedaço (que será descartado).
            // Importante: pausar video/audio explicitamente, pois esses elementos
            // continuam tocando (inclusive o áudio) mesmo depois de removidos da cena 3D.
            if (firstClip.type === 'video') {
                firstClip.video.pause();
                scene.remove(firstClip.mesh);
            } else if (firstClip.type === 'audio') {
                if (firstClip.audio) firstClip.audio.pause();
            } else {
                scene.remove(firstClip.mesh);
            }

            // Remove o segundo pedaço de onde foi inserido (fim do array)
            const secondIdx = state.clips.indexOf(secondClip);
            state.clips.splice(secondIdx, 1);

            // O segundo pedaço assume a posição na timeline do primeiro
            secondClip.timelineStart = originalStart;

            // E assume a camada (índice no array) do primeiro pedaço, substituindo-o
            state.clips[idx] = secondClip;

            updateLayering();
            selectClip(idx);
            generateFFmpeg();
        };

        window.copyClip = function() {
            if (state.selectedIdx === null) return;
            const src = state.clips[state.selectedIdx];
            // Deep-copy all plain properties; media elements are referenced by src URL
            clipboard = {
                type: src.type,
                path: src.path,
                duration: src.duration,
                timelineStart: src.timelineStart,
                sourceStart: src.sourceStart || 0,
                scale: src.scale,
                volume: src.volume,
                speed: src.speed || 1,
                hasAudio: src.hasAudio !== false,
                fadeIn: src.fadeIn || 0,
                fadeOut: src.fadeOut || 0,
                normalize: src.normalize || false,
                normalizeLufs: src.normalizeLufs ?? -14,
                fitMode: src.fitMode,
                nativeW: src.nativeW,
                nativeH: src.nativeH,
                rotate: src.rotate || 0,
                cropX: src.cropX || 0,
                cropY: src.cropY || 0,
                cropW: src.cropW || null,
                cropH: src.cropH || null,
                // video src url
                videoSrc: src.type === 'video' ? src.video.src : null,
                // audio src url
                audioSrc: src.type === 'audio' ? src.audio.src : null,
                // image texture reference
                texture: src.type === 'image' ? src.texture : null,
                // mesh position
                posX: src.mesh.position.x,
                posY: src.mesh.position.y,
                // text props
                text: src.text,
                fontSize: src.fontSize,
                textColor: src.textColor,
                fontPath: src.fontPath,
                textRotate: src.type === 'text' ? src.mesh.rotation.z : 0,
            };
            // Flash the selected clip block to give visual feedback
            const blocks = document.querySelectorAll('.clip-block.selected');
            blocks.forEach(b => {
                b.style.outline = '2px solid #fff';
                b.style.opacity = '0.6';
                setTimeout(() => { b.style.opacity = '1'; }, 200);
            });
        };

        window.pasteClip = function() {
            if (!clipboard) return;
            const c = clipboard;
            // Paste at current playhead; offset slightly if same position as original
            const pasteStart = state.time !== c.timelineStart ? state.time : c.timelineStart + 0.5;

            if (c.type === 'video') {
                const video = document.createElement('video');
                video.src = c.videoSrc;
                video.muted = false; video.loop = true;
                const tex = new THREE.VideoTexture(video);
                const mesh = new THREE.Mesh(
                    computeGeometry(c.nativeW, c.nativeH, c.fitMode),
                    new THREE.MeshBasicMaterial({ map: tex, side: THREE.DoubleSide, transparent: true })
                );
                mesh.visible = false;
                mesh.position.set(c.posX, c.posY, 0);
                mesh.scale.set(c.scale, c.scale, 1);
                mesh.rotation.z = -(c.rotate || 0) * Math.PI / 180;
                scene.add(mesh);
                video.playbackRate = c.speed || 1;
                state.clips.push({
                    id: Date.now() + Math.random(), type: 'video', path: c.path,
                    timelineStart: pasteStart, sourceStart: c.sourceStart,
                    duration: c.duration, scale: c.scale, volume: c.volume, speed: c.speed || 1,
                    hasAudio: c.hasAudio !== false,
                    fadeIn: c.fadeIn, fadeOut: c.fadeOut,
                    normalize: c.normalize || false, normalizeLufs: c.normalizeLufs ?? -14,
                    fitMode: c.fitMode, nativeW: c.nativeW, nativeH: c.nativeH,
                    rotate: c.rotate || 0,
                    cropX: c.cropX || 0, cropY: c.cropY || 0, cropW: c.cropW || null, cropH: c.cropH || null,
                    mesh, video, texture: tex
                });
            } else if (c.type === 'image') {
                const mesh = new THREE.Mesh(
                    computeGeometry(c.nativeW, c.nativeH, c.fitMode),
                    new THREE.MeshBasicMaterial({ map: c.texture, side: THREE.DoubleSide, transparent: true })
                );
                mesh.visible = false;
                mesh.position.set(c.posX, c.posY, 0);
                mesh.scale.set(c.scale, c.scale, 1);
                mesh.rotation.z = -(c.rotate || 0) * Math.PI / 180;
                scene.add(mesh);
                state.clips.push({
                    id: Date.now() + Math.random(), type: 'image', path: c.path,
                    timelineStart: pasteStart, duration: c.duration, scale: c.scale,
                    fadeIn: c.fadeIn, fadeOut: c.fadeOut,
                    fitMode: c.fitMode, nativeW: c.nativeW, nativeH: c.nativeH,
                    rotate: c.rotate || 0,
                    cropX: c.cropX || 0, cropY: c.cropY || 0, cropW: c.cropW || null, cropH: c.cropH || null,
                    mesh, texture: c.texture
                });
            } else if (c.type === 'audio') {
                const audio = document.createElement('audio');
                audio.src = c.audioSrc;
                state.clips.push({
                    id: Date.now() + Math.random(), type: 'audio', path: c.path,
                    timelineStart: pasteStart, sourceStart: c.sourceStart,
                    duration: c.duration, volume: c.volume,
                    fadeIn: c.fadeIn, fadeOut: c.fadeOut,
                    normalize: c.normalize || false, normalizeLufs: c.normalizeLufs ?? -14,
                    audio,
                    mesh: { position: { x: 0, y: 0, z: 0 }, visible: false, scale: { set: () => {} } }
                });
            } else if (c.type === 'text') {
                const tex = createTextTexture(c.text, c.fontSize, c.textColor);
                const mesh = new THREE.Mesh(
                    new THREE.PlaneGeometry(tex.image.width, tex.image.height),
                    new THREE.MeshBasicMaterial({ map: tex, transparent: true, side: THREE.DoubleSide })
                );
                mesh.visible = false;
                mesh.position.set(c.posX, c.posY, 0);
                mesh.rotation.z = c.textRotate || 0;
                scene.add(mesh);
                state.clips.push({
                    id: Date.now() + Math.random(), type: 'text',
                    text: c.text, fontSize: c.fontSize, textColor: c.textColor, fontPath: c.fontPath,
                    timelineStart: pasteStart, duration: c.duration,
                    fadeIn: c.fadeIn, fadeOut: c.fadeOut,
                    mesh, texture: tex
                });
            }

            const newIndex = state.clips.length - 1;
            updateLayering();
            syncUI();
            selectClip(newIndex);
            generateFFmpeg();
        };

        function renderRuler() {
            const ruler = document.getElementById('timeline-ruler');
            ruler.innerHTML = '';
            let maxTime = 30; 
            if (state.clips.length > 0) {
                maxTime = Math.max(30, Math.max(...state.clips.map(c => c.timelineStart + c.duration)) + 10);
            }
            const totalWidth = maxTime * PROJECT.pxPerSec;
            ruler.style.width = `${totalWidth}px`;
            trackArea.style.width = `${totalWidth}px`;
            for (let i = 0; i <= maxTime; i++) {
                const tick = document.createElement('div');
                tick.className = `ruler-tick ${i % 5 === 0 ? 'major' : ''}`;
                tick.style.left = `${i * PROJECT.pxPerSec}px`;
                tick.innerText = i % 5 === 0 ? `${i}s` : '';
                ruler.appendChild(tick);
            }
        }

        // Assign each clip a lane (row) using greedy interval packing.
        // Clips that don't overlap in time share the same lane.
        function assignLanes(clips) {
            // laneEnd[lane] = the end time of the last clip placed in that lane
            const laneEnd = [];
            const lanes = new Array(clips.length).fill(0);
            clips.forEach((clip, i) => {
                const start = clip.timelineStart;
                const end = start + clip.duration;
                // Find the first lane whose last clip has already ended (with 0.05s gap tolerance)
                let placed = false;
                for (let l = 0; l < laneEnd.length; l++) {
                    if (laneEnd[l] <= start + 0.05) {
                        lanes[i] = l;
                        laneEnd[l] = end;
                        placed = true;
                        break;
                    }
                }
                if (!placed) {
                    lanes[i] = laneEnd.length;
                    laneEnd.push(end);
                }
            });
            return lanes;
        }

        function syncUI() {
            const list = document.getElementById('assets-list');
            list.innerHTML = '';
            trackArea.querySelectorAll('.clip-block').forEach(c => c.remove());

            const lanes = assignLanes(state.clips);
            const totalLanes = lanes.length > 0 ? Math.max(...lanes) + 1 : 1;

            state.clips.forEach((clip, i) => {
                const item = document.createElement('div');
                item.className = `asset-item ${state.selectedIdx === i ? 'active' : ''}`;
                item.innerText = clip.type === 'video' ? `[Vid] ${clip.path}` : (clip.type === 'image' ? `[Img] ${clip.path}` : (clip.type === 'audio' ? `[Aud] ${clip.path}` : `[Txt] ${clip.text}`));
                item.onclick = () => selectClip(i);
                list.appendChild(item);
                const block = document.createElement('div');
                block.className = `clip-block ${clip.type === 'text' ? 'text-type' : (clip.type === 'image' ? 'image-type' : (clip.type === 'audio' ? 'audio-type' : ''))}`;
                if (state.selectedIdx === i) block.classList.add('selected');
                block.dataset.id = clip.id;
                block.style.top = `${lanes[i] * 32 + 4}px`;
                block.style.left = `${clip.timelineStart * PROJECT.pxPerSec}px`;
                block.style.width = `${clip.duration * PROJECT.pxPerSec}px`;
                block.innerText = clip.type === 'audio' ? `🎵 ${clip.path}` : (clip.type === 'video' ? `${clip.path}${(clip.speed && clip.speed !== 1) ? ` ⚡${clip.speed}x` : ''}` : (clip.type === 'image' ? clip.path : clip.text));
                const res = document.createElement('div');
                res.className = 'resizer';
                res.dataset.id = clip.id;
                block.appendChild(res);
                trackArea.appendChild(block);
            });
            renderRuler();
            document.getElementById('playhead').style.height = `${totalLanes * 32 + 20}px`;
        }

        function syncVideos() {
            state.clips.forEach(clip => {
                const active = state.time >= clip.timelineStart && state.time <= (clip.timelineStart + clip.duration);
                if (clip.type !== 'audio') clip.mesh.visible = active;
                if (active) {
                    if(clip.type === 'video') {
                        const speed = clip.speed || 1;
                        clip.video.currentTime = (state.time - clip.timelineStart) * speed + clip.sourceStart;
                        clip.video.volume = Math.min(1, clip.volume);
                        clip.video.playbackRate = speed;
                        if (!state.isPlaying) clip.video.pause();
                    }
                    if(clip.type === 'audio') {
                        clip.audio.currentTime = (state.time - clip.timelineStart) + clip.sourceStart;
                        clip.audio.volume = Math.min(1, clip.volume);
                        if (!state.isPlaying) clip.audio.pause();
                    }
                    if (clip.type !== 'audio') clip.mesh.material.opacity = calculateOpacity(clip); 
                } else {
                    if(clip.type === 'video') clip.video.pause();
                    if(clip.type === 'audio') clip.audio.pause();
                }
            });
        }

        function updatePlayhead() {
            document.getElementById('playhead').style.left = `${state.time * PROJECT.pxPerSec}px`;
        }

        window.togglePlayback = function() {
            state.isPlaying = !state.isPlaying;
            state.clips.forEach(c => {
                if(c.type === 'video') {
                    const active = state.time >= c.timelineStart && state.time <= (c.timelineStart + c.duration);
                    if (active) {
                        c.video.playbackRate = c.speed || 1;
                        state.isPlaying ? c.video.play().catch(() => {}) : c.video.pause();
                    }
                }
                if(c.type === 'audio') {
                    const active = state.time >= c.timelineStart && state.time <= (c.timelineStart + c.duration);
                    if (active) {
                        if (state.isPlaying) {
                            c.audio.currentTime = (state.time - c.timelineStart) + c.sourceStart;
                            c.audio.play().catch(() => {});
                        } else {
                            c.audio.pause();
                        }
                    }
                }
            });
        }

        function escapePath(p) {
            // Escapa aspas duplas para uso seguro dentro de -i "path"
            return String(p || '').replace(/"/g, '\\"');
        }

        function escapeDrawtext(s) {
            // drawtext usa : e ' como delimitadores especiais — precisam ser escapados
            return String(s || '')
                .replace(/\\/g, '\\\\\\\\')
                .replace(/:/g, '\\:')
                .replace(/'/g, "\u2019");
        }

        // O filtro atempo do FFmpeg só aceita fatores entre 0.5 e 2.0 por instância.
        // Para velocidades fora desse intervalo (ex: 0.25x ou 4x), encadeamos
        // múltiplos atempo até atingir o fator total desejado.
        function buildAtempoChain(speed) {
            let s = speed;
            const factors = [];
            if (s <= 0) s = 1;
            while (s > 2.0) { factors.push(2.0); s /= 2.0; }
            while (s < 0.5) { factors.push(0.5); s /= 0.5; }
            factors.push(s);
            return factors.map(f => `atempo=${f.toFixed(4)}`).join(',');
        }

        // Duração (em segundos do ARQUIVO ORIGEM) que precisa ser lida para que,
        // após aplicar a velocidade do clipe, o resultado preencha `clip.duration`
        // segundos na timeline.
        function sourceDuration(clip) {
            return clip.duration * (clip.speed || 1);
        }

        // --- SOLUÇÃO PARA O CONSUMO EXCESSIVO DE MEMÓRIA COM MÚLTIPLOS loudnorm ---
        // Em vez de rodar N filtros loudnorm em paralelo dentro do mesmo filter_complex
        // (o que faz o FFmpeg ter que bufferizar várias trilhas simultaneamente enquanto
        // cada loudnorm processa sua análise de loudness — isso é o que explode a RAM),
        // cada clipe marcado para normalização é processado em um comando ffmpeg SEPARADO
        // e SEQUENCIAL, gerando um arquivo .wav já normalizado. O comando final de montagem
        // não usa mais loudnorm nenhum: só consome os .wav prontos com volume/adelay simples,
        // que é praticamente sem custo de memória.
        function buildNormalizationScript(clips) {
            const lines = [];
            const fileMap = {}; // clip.id -> nome do arquivo normalizado

            clips.forEach(clip => {
                if (!clip.normalize) return;
                if (clip.type !== 'video' && clip.type !== 'audio') return;
                if (clip.type === 'video' && clip.hasAudio === false) return;

                const outFile = `tmp_norm_${clip.id}.wav`;
                const ssFlag = clip.sourceStart > 0 ? `-ss ${clip.sourceStart} ` : ``;
                // Para vídeo, lemos a duração de origem (já considerando a velocidade),
                // pois o atempo é aplicado depois, no comando principal.
                const tDur = clip.type === 'video' ? sourceDuration(clip) : clip.duration;
                // Cada chamada aqui roda isoladamente (uma de cada vez), então o pico de
                // memória do loudnorm nunca se soma ao de outras camadas.
                lines.push(`ffmpeg -y ${ssFlag}-i "${escapePath(clip.path)}" -t ${tDur} -vn -af "loudnorm=I=${clip.normalizeLufs}:TP=-1.0:LRA=11" -ar 44100 -ac 2 "${outFile}"`);
                fileMap[clip.id] = outFile;
            });

            return { lines, fileMap };
        }

        function generateFFmpeg() {
            if (state.clips.length === 0) {
                document.getElementById('prompt-text').innerText = "Import videos or add text to generate command...";
                return;
            }

            // Gera (se necessário) o script de pré-normalização e o mapa de arquivos já normalizados
            const { lines: normLines, fileMap: normFileMap } = buildNormalizationScript(state.clips);

            let inputCounter = 0;
            let audioCounter = 0; 
            let inputs = "";
            let totalT = 0;

            state.clips.forEach(clip => {
                const normFile = normFileMap[clip.id]; // undefined se o clipe não está normalizando
                if (clip.type === 'video' || clip.type === 'image') {
                    clip.inputIndex = inputCounter++; 
                    const ssFlag = (clip.type === 'video' && clip.sourceStart > 0) ? `-ss ${clip.sourceStart} ` : ``;
                    inputs += (clip.type === 'image' ? `-loop 1 ` : ``) + `${ssFlag}-i "${escapePath(clip.path)}" `;

                    if (clip.type === 'video' && normFile) {
                        // Áudio já normalizado entra como um input separado, só com -t (já vem cortado)
                        clip.audioInputIndex = inputCounter++;
                        inputs += `-i "${normFile}" `;
                    }
                } else if (clip.type === 'audio') {
                    clip.inputIndex = inputCounter++;
                    if (normFile) {
                        // Usa direto o wav já normalizado (já cortado/trimado no passo 1)
                        inputs += `-i "${normFile}" `;
                    } else {
                        const ssFlag = clip.sourceStart > 0 ? `-ss ${clip.sourceStart} ` : ``;
                        inputs += `${ssFlag}-i "${escapePath(clip.path)}" `;
                    }
                } else {
                    clip.inputIndex = null; 
                }
                totalT = Math.max(totalT, clip.timelineStart + clip.duration);
            });

            const layerClipped = state.clips; 
            let vChains = [], aChains = [], ovlChain = "";
            let ovlCounter = 0; // tracks how many overlay steps have been added

            layerClipped.forEach((clip, i) => {
                const globalStart = clip.timelineStart;
                const globalEnd = clip.timelineStart + clip.duration;
                
                if (clip.type === 'video' || clip.type === 'image') {
                    const vIn = `[${clip.inputIndex}:v]`, vP = `[v${i}]`;
                    const duration = clip.duration;
                    const fadeInTime = Math.min(clip.fadeIn, duration);
                    const fadeOutTime = Math.min(clip.fadeOut, duration);
                    const fadeOutStartGlobal = globalEnd - fadeOutTime;

                    let vFilter = "";
                    if (clip.type === 'video') {
                        const speed = clip.speed || 1;
                        const srcDur = sourceDuration(clip); // segundos a ler da fonte para preencher `duration` na timeline
                        vFilter = `trim=start=0:duration=${srcDur},setpts=PTS-STARTPTS`;
                        if (speed !== 1) vFilter += `,setpts=${(1 / speed).toFixed(6)}*PTS`;
                        vFilter += `,setpts=PTS+${globalStart}/TB`;
                    } else {
                        vFilter = `setpts=PTS-STARTPTS,setpts=PTS+${globalStart}/TB`;
                    }

                    // Crop filter (applied before scale)
                    const hasCrop = clip.cropW || clip.cropH || clip.cropX || clip.cropY;
                    if (hasCrop) {
                        const cw = clip.cropW || clip.nativeW;
                        const ch = clip.cropH || clip.nativeH;
                        const cx = clip.cropX || 0;
                        const cy = clip.cropY || 0;
                        vFilter += `,crop=${Math.round(cw)}:${Math.round(ch)}:${Math.round(cx)}:${Math.round(cy)}`;
                    }

                    // Compute final dimensions BEFORE applying rotate filter
                    // (rotate changes the bounding box, so we scale first, then rotate)
                    // If cropped, the effective native size is the crop region, not the full frame
                    const isFit = (clip.fitMode || 'fit') === 'fit';
                    const effectiveNativeW = (clip.cropW || clip.nativeW) || PROJECT.w;
                    const effectiveNativeH = (clip.cropH || clip.nativeH) || PROJECT.h;
                    let finalW, finalH;
                    if (isFit && effectiveNativeW && effectiveNativeH) {
                        const s = Math.min(PROJECT.w / effectiveNativeW, PROJECT.h / effectiveNativeH) * clip.scale;
                        finalW = effectiveNativeW * s;
                        finalH = effectiveNativeH * s;
                    } else {
                        finalW = PROJECT.w * clip.scale;
                        finalH = PROJECT.h * clip.scale;
                    }

                    // Rotate filter (applied AFTER scale so output dimensions are correct)
                    // For overlay positioning we also need to know the post-rotate bounding box
                    let overlayX = 0;
                    let overlayY = 0;
                    let rotatedW = finalW, rotatedH = finalH;

                    if (clip.scale > 4) {
                        if (isFit && clip.nativeW && clip.nativeH) {
                            vFilter += `,scale=${PROJECT.w}:${PROJECT.h}:force_original_aspect_ratio=decrease,pad=${PROJECT.w}:${PROJECT.h}:(ow-iw)/2:(oh-ih)/2`;
                        } else {
                            vFilter += `,scale=${PROJECT.w}:${PROJECT.h}`;
                        }
                        const cropW = Math.round(PROJECT.w / clip.scale);
                        const cropH = Math.round(PROJECT.h / clip.scale);
                        let cropX = Math.round((PROJECT.w / 2) - (clip.mesh.position.x / clip.scale) - (cropW / 2));
                        let cropY = Math.round((PROJECT.h / 2) + (clip.mesh.position.y / clip.scale) - (cropH / 2));
                        cropX = Math.max(0, Math.min(cropX, PROJECT.w - cropW));
                        cropY = Math.max(0, Math.min(cropY, PROJECT.h - cropH));
                        vFilter += `,crop=${cropW}:${cropH}:${cropX}:${cropY},scale=${PROJECT.w}:${PROJECT.h}`;
                        overlayX = 0;
                        overlayY = 0;
                    } else {
                        // Normal scale — apply FIRST so rotate works on the already-scaled frame
                        if (isFit && clip.nativeW && clip.nativeH) {
                            vFilter += `,scale=${Math.round(finalW)}:${Math.round(finalH)}:force_original_aspect_ratio=decrease`;
                        } else {
                            vFilter += `,scale=${Math.round(finalW)}:${Math.round(finalH)}`;
                        }

                        // Rotate AFTER scale so output dimensions stay predictable
                        if (clip.rotate && clip.rotate !== 0) {
                            const deg = ((clip.rotate % 360) + 360) % 360;
                            if (deg === 90) {
                                vFilter += `,transpose=1`;
                                rotatedW = finalH; rotatedH = finalW;
                            } else if (deg === 180) {
                                vFilter += `,transpose=1,transpose=1`;
                                // 180° keeps same dimensions
                            } else if (deg === 270) {
                                vFilter += `,transpose=2`;
                                rotatedW = finalH; rotatedH = finalW;
                            } else {
                                // Arbitrary angle: transparent fill, expand bounding box to avoid clipping
                                const rad = deg * Math.PI / 180;
                                const cosA = Math.abs(Math.cos(rad));
                                const sinA = Math.abs(Math.sin(rad));
                                rotatedW = Math.ceil(finalW * cosA + finalH * sinA);
                                rotatedH = Math.ceil(finalW * sinA + finalH * cosA);
                                // Ensure even dimensions for codec compatibility
                                rotatedW += rotatedW % 2;
                                rotatedH += rotatedH % 2;
                                vFilter += `,rotate=${rad.toFixed(6)}:c=none:ow=${rotatedW}:oh=${rotatedH}`;
                                vFilter += `,format=yuva420p`;
                            }
                        }

                        overlayX = Math.round(960 + clip.mesh.position.x - rotatedW / 2);
                        overlayY = Math.round(540 - clip.mesh.position.y - rotatedH / 2);
                    }

                    if (fadeInTime > 0) vFilter += `,fade=t=in:st=${globalStart}:d=${fadeInTime}`;
                    if (fadeOutTime > 0) vFilter += `,fade=t=out:st=${fadeOutStartGlobal}:d=${fadeOutTime}`;
                    vChains.push(`${vIn}${vFilter}${vP}`);

                    const prev = ovlCounter === 0 ? `[bg]` : `[ovl${ovlCounter-1}]`;
                    const next = `[ovl${ovlCounter}]`;
                    ovlChain += `${prev}[v${i}]overlay=${overlayX}:${overlayY}:enable='between(t,${globalStart},${globalEnd})'${next},`;
                    ovlCounter++;

                    if (clip.type === 'video' && clip.hasAudio !== false) {
                        const usingNormFile = clip.audioInputIndex !== undefined;
                        const aIn = usingNormFile ? `[${clip.audioInputIndex}:a]` : `[${clip.inputIndex}:a]`;
                        const aP = `[a${audioCounter}]`;
                        const delayMs = Math.round(clip.timelineStart * 1000);
                        const speed = clip.speed || 1;
                        const srcDur = sourceDuration(clip);
                        let aFilter = `atrim=start=0:duration=${srcDur},asetpts=PTS-STARTPTS`;
                        if (speed !== 1) aFilter += `,${buildAtempoChain(speed)}`;
                        aFilter += `,asetpts=PTS+${globalStart}/TB`;
                        // loudnorm já foi aplicado no passo 1 (script de pré-normalização) — não repetir aqui
                        if (clip.normalize && !usingNormFile) aFilter += `,loudnorm=I=${clip.normalizeLufs}:TP=-1.0:LRA=11`;
                        if (fadeInTime > 0) aFilter += `,afade=t=in:st=${globalStart}:d=${fadeInTime}`;
                        if (fadeOutTime > 0) aFilter += `,afade=t=out:st=${fadeOutStartGlobal}:d=${fadeOutTime}`;
                        aFilter += `,volume=${clip.volume},adelay=${delayMs}|${delayMs},aresample=44100`;
                        aChains.push(`${aIn}${aFilter}${aP}`);
                        audioCounter++;
                    }
                } else if (clip.type === 'audio') {
                    // Standalone audio clip — only audio chain, no overlay
                    const usingNormFile = !!normFileMap[clip.id];
                    const aIn = `[${clip.inputIndex}:a]`;
                    const aP = `[a${audioCounter}]`;
                    const delayMs = Math.round(clip.timelineStart * 1000);
                    const fadeInTime = Math.min(clip.fadeIn || 0, clip.duration);
                    const fadeOutTime = Math.min(clip.fadeOut || 0, clip.duration);
                    const fadeOutStartGlobal = globalEnd - fadeOutTime;
                    let aFilter = `atrim=start=0:duration=${clip.duration},asetpts=PTS-STARTPTS`;
                    aFilter += `,asetpts=PTS+${globalStart}/TB`;
                    // loudnorm já foi aplicado no passo 1 (script de pré-normalização) — não repetir aqui
                    if (clip.normalize && !usingNormFile) aFilter += `,loudnorm=I=${clip.normalizeLufs}:TP=-1.0:LRA=11`;
                    if (fadeInTime > 0) aFilter += `,afade=t=in:st=${globalStart}:d=${fadeInTime}`;
                    if (fadeOutTime > 0) aFilter += `,afade=t=out:st=${fadeOutStartGlobal}:d=${fadeOutTime}`;
                    aFilter += `,volume=${clip.volume},adelay=${delayMs}|${delayMs},aresample=44100`;
                    aChains.push(`${aIn}${aFilter}${aP}`);
                    audioCounter++;
                } else {
                    // text clip
                    const texW = clip.texture.image.width;
                    const isCenterX = clip.mesh.position.x === 0;
                    const posX = isCenterX ? '(w-tw)/2' : Math.round(960 + clip.mesh.position.x - (texW / 2));
                    const verticalOffset = clip.fontSize * 0.1; 
                    const posY = Math.round(540 - clip.mesh.position.y - (clip.fontSize / 2) + verticalOffset);
                    let finalColor = clip.textColor;
                    if (clip.fadeIn > 0 || clip.fadeOut > 0) {
                        const alphaExpr = `if(lt(t,${globalStart}+${clip.fadeIn}),(t-${globalStart})/${clip.fadeIn},if(lt(t,${globalEnd}-${clip.fadeOut}),1,(${globalEnd}-t)/${clip.fadeOut}))`;
                        finalColor = `${clip.textColor}@${alphaExpr}`;
                    }
                    const prev = ovlCounter === 0 ? `[bg]` : `[ovl${ovlCounter-1}]`;
                    const next = `[ovl${ovlCounter}]`;
                    ovlChain += `${prev}drawtext=text='${escapeDrawtext(clip.text)}':fontfile='${escapePath(clip.fontPath)}':x=${posX}:y=${posY}:fontsize=${clip.fontSize}:fontcolor=${finalColor}:borderw=3:bordercolor=black:enable='between(t,${globalStart},${globalEnd})'${next},`;
                    ovlCounter++;
                }
            });

            if (ovlChain.endsWith(',')) ovlChain = ovlChain.slice(0, -1);
            const outputFps = state.export60fps ? 60 : 30;
            const bg = `color=c=black:s=1920x1080:d=${totalT}:r=${outputFps}[bg]`;
            const finalVString = `${bg};${vChains.join(',')};${ovlChain}`;
            const vOut = ovlCounter > 0 ? `[ovl${ovlCounter - 1}]` : `[bg]`;
            
            // --- CORREÇÃO DO ÁUDIO ---
            // Criamos um fluxo de silêncio absoluto que dura todo o projeto
            const silentBase = `anullsrc=channel_layout=stereo:sample_rate=44100:d=${totalT}[silent]`;
            let finalA = "";
            let aOut = "[outa]";

            if (aChains.length > 0) {
                // Listamos o silêncio + todos os vídeos: [silent][a0][a1]...
                const audioLabels = `[silent]` + Array.from({length: audioCounter}, (_, i) => `[a${i}]`).join('');
                // Mixamos todos eles. O número de inputs é audioCounter + 1 (por causa do silêncio)
                finalA = `${silentBase};${aChains.join(',')};${audioLabels}amix=inputs=${audioCounter + 1}:duration=longest:normalize=0${aOut}`;
            } else {
                finalA = `${silentBase}`;
                aOut = "[silent]";
            }
            
            const mainCmd = `ffmpeg ${inputs} -filter_complex "${finalVString};${finalA}" -map "${vOut}" -map "${aOut}" -t ${totalT} -c:v libx264 -r ${outputFps} -c:a aac -movflags +faststart output.mp4`;

            if (normLines.length > 0) {
                const script =
`# PASSO 1/2 — Pré-normalização (rode estas linhas UMA POR VEZ / em sequência).
# Isso evita ter N filtros loudnorm rodando ao mesmo tempo no comando final,
# que é a causa do consumo excessivo de memória RAM.
${normLines.join('\n')}

# PASSO 2/2 — Comando final de montagem (sem loudnorm, baixo consumo de memória)
${mainCmd}

# (Opcional) depois de renderizar, pode apagar os temporários:
# rm ${Object.values(normFileMap).map(f => `"${f}"`).join(' ')}`;
                document.getElementById('prompt-text').innerText = script;
            } else {
                document.getElementById('prompt-text').innerText = mainCmd;
            }
        }


        window.copyPrompt = function() {
            const text = document.getElementById('prompt-text').innerText;
            const b = document.querySelector('.copy-btn');
            if (!text || text.startsWith('Import videos')) return;
            navigator.clipboard.writeText(text).then(() => {
                b.innerText = 'Copiado!';
                setTimeout(() => b.innerText = 'Copy Command', 2000);
            }).catch(() => {
                b.innerText = 'Falhou — copie manualmente';
                setTimeout(() => b.innerText = 'Copy Command', 2000);
            });
        };

        const clock = new THREE.Clock();
        function animate() {
            requestAnimationFrame(animate);
            if (state.selectedIdx !== null) {
                const clip = state.clips[state.selectedIdx];
                if (clip.type !== 'audio' && clip.scale !== undefined) {
                    handleMesh.visible = true;
                    handleMesh.position.x = clip.mesh.position.x + (PROJECT.w / 2 * clip.scale);
                    handleMesh.position.y = clip.mesh.position.y - (PROJECT.h / 2 * clip.scale);
                    handleMesh.position.z = clip.mesh.position.z + 0.1;
                } else {
                    handleMesh.visible = false;
                }
            } else {
                handleMesh.visible = false;
            }

            if (state.isPlaying) {
                state.time += clock.getDelta();
                updatePlayhead();
                let max = 0; 
                state.clips.forEach(c => max = Math.max(max, c.timelineStart + c.duration));
                if (state.time > max) {
                    state.time = 0; state.isPlaying = false;
                    state.clips.forEach(c => { 
                        if(c.type === 'video') {
                            c.video.currentTime = c.sourceStart; 
                            c.video.pause();
                        }
                        if(c.type === 'audio') {
                            c.audio.currentTime = c.sourceStart;
                            c.audio.pause();
                        }
                    });
                } else {
                    state.clips.forEach(clip => {
                        const active = state.time >= clip.timelineStart && state.time <= (clip.timelineStart + clip.duration);
                        if (clip.type !== 'audio') clip.mesh.visible = active;
                        if (active) {
                            if (clip.type !== 'audio') clip.mesh.material.opacity = calculateOpacity(clip);
                            if(clip.type === 'video') {
                                if (clip.video.paused) {
                                    const speed = clip.speed || 1;
                                    clip.video.currentTime = (state.time - clip.timelineStart) * speed + clip.sourceStart;
                                    clip.video.playbackRate = speed;
                                    clip.video.play().catch(() => {});
                                }
                            }
                            if(clip.type === 'audio') {
                                if (clip.audio.paused) {
                                    clip.audio.currentTime = (state.time - clip.timelineStart) + clip.sourceStart;
                                    clip.audio.volume = Math.min(1, clip.volume);
                                    clip.audio.play().catch(() => {});
                                }
                            }
                        } else {
                            if(clip.type === 'video') clip.video.pause();
                            if(clip.type === 'audio') clip.audio.pause();
                        }
                    });
                }
            }
            renderer.render(scene, camera);
        }
        animate();
    </script>

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>FFmpeg Studio Pro - Advanced Edition</title>
    <style>
        :root { 
            --bg: #0a0a0a; --panel: #141414; --accent: #00ff88; --text: #efefef; 
            --border: #2a2a2a; --sidebar-w: 340px; --timeline-h: 280px;
            --danger: #ff4444;
        }
        body { 
            margin: 0; font-family: 'Segoe UI', system-ui, sans-serif; 
            background: var(--bg); color: var(--text); 
            display: flex; height: 100vh; overflow: hidden; user-select: none;
        }
        #sidebar { 
            width: var(--sidebar-w); 
            flex-shrink: 0; 
            background: var(--panel); 
            border-right: 1px solid var(--border); 
            display: flex; 
            flex-direction: column; 
            padding: 20px; 
            box-sizing: border-box; 
            z-index: 100;
            height: 100vh;
            overflow-y: auto;
        }
        .section-title { font-size: 12px; text-transform: uppercase; color: #666; letter-spacing: 1px; margin-bottom: 15px; margin-top: 10px;}
        
        #assets-list { 
            flex: 1; 
            overflow-y: auto; 
            margin-bottom: 20px;
            padding-right: 5px;
        }
        #assets-list::-webkit-scrollbar { width: 6px; }
        #assets-list::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }

        #main { 
            flex: 1; 
            min-width: 0; 
            display: flex; flex-direction: column; position: relative; background: #000; 
        }
        #viewport-container { 
            flex: 1; position: relative; display: flex; align-items: center; justify-content: center; 
            background: #050505; overflow: hidden; 
        }
        canvas { background: #000; display: block; cursor: default; }
        #timeline { 
            height: var(--timeline-h); background: var(--panel); 
            border-top: 1px solid var(--border); padding: 10px 12px; box-sizing: border-box;
            display: flex; flex-direction: column;
        }
        #timeline-scroll-container { 
            overflow-x: auto; 
            overflow-y: hidden;
            display: block; 
            border: 1px solid var(--border);
            position: relative;
        }
        #timeline-scroll-container::-webkit-scrollbar { height: 8px; }
        #timeline-scroll-container::-webkit-scrollbar-track { background: #111; }
        #timeline-scroll-container::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }
        #timeline-scroll-container::-webkit-scrollbar-thumb:hover { background: #444; }

        #timeline-ruler {
            position: relative; height: 25px; background: #1a1a1a;
            border-bottom: 1px solid var(--border);
            font-family: monospace; font-size: 10px; color: #888;
            width: 100%; 
        }
        .ruler-tick {
            position: absolute; top: 0; height: 100%;
            border-left: 1px solid #333; padding-left: 4px;
            display: flex; align-items: center;
        }
        .ruler-tick.major { border-left: 1px solid #555; color: #bbb; }
        #tracks-area { 
            position: relative; height: 200px; background: #0d0d0d; 
            overflow-y: auto; 
            overflow-x: visible; 
            cursor: crosshair;
        }
        .grid-line {
            position: absolute; top: 0; left: 0; 
            width: 100%; 
            height: 100%;
            background-image: linear-gradient(90deg, #1a1a1a 1px, transparent 1px);
            background-size: 20px 100%; pointer-events: none;
        }
        #playhead {
            position: absolute; top: 0; left: 0; width: 2px; 
            background: #ff3333; z-index: 50; pointer-events: none;
        }
        .btn { 
            background: var(--accent); color: #000; border: none; padding: 12px; 
            cursor: pointer; font-weight: 600; border-radius: 6px; width: 100%; 
            margin-bottom: 10px; transition: all 0.2s;
        }
        .btn:hover { filter: brightness(1.1); transform: translateY(-1px); }
        .btn-dark { background: #333; color: #fff; }
        .btn-danger { background: var(--danger); color: #fff; }
        .btn-small { padding: 4px 8px; font-size: 10px; width: auto; margin: 0; }
        
        .asset-item { 
            background: #1f1f1f; padding: 12px; margin-bottom: 8px; 
            border-radius: 6px; cursor: pointer; border-left: 3px solid transparent; 
            font-size: 13px; transition: 0.2s; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .asset-item.active { border-left-color: var(--accent); background: #2a2a2a; }
        
        .prop-group { margin-bottom: 12px; }
        label { display: block; font-size: 11px; color: #888; margin-bottom: 4px; }
        input { 
            width: 100%; background: #000; border: 1px solid var(--border); 
            color: #fff; padding: 6px; box-sizing: border-box; border-radius: 4px; 
            font-size: 12px;
        }
        .prop-row { display: flex; gap: 10px; }
        
        #prompt-box {
            position: absolute; bottom: 320px; left: 20px; right: 20px;
            background: rgba(0,0,0,0.9); border: 1px solid var(--accent);
            border-radius: 8px; z-index: 1000; padding: 15px;
        }
        #prompt-text { 
            font-family: 'Consolas', monospace; font-size: 12px; color: var(--accent); 
            white-space: pre-wrap; word-break: break-all; max-height: 100px; 
            overflow-y: auto; margin-bottom: 10px;
        }
        .copy-btn { width: auto; padding: 5px 15px; font-size: 11px; margin: 0; }
        .clip-block {
            position: absolute; height: 26px; background: var(--accent);
            color: #000; font-size: 11px; font-weight: bold; border-radius: 4px;
            cursor: grab; display: flex; align-items: center; padding: 0 10px;
            box-sizing: border-box; overflow: hidden; z-index: 10;
        }
        .clip-block.text-type { background: #00ccff; }
        .clip-block.image-type { background: #ffcc00; }
        .clip-block.audio-type { background: #cc44ff; color: #fff; }
        .clip-block.selected {
            outline: 2px solid #fff;
            outline-offset: -2px;
        }
        .resizer {
            position: absolute; right: 0; top: 0; width: 12px; height: 100%;
            cursor: col-resize; background: rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>

    <div id="sidebar">
        <div class="section-title">Media Assets</div>
        <input type="file" id="file-input" multiple accept="video/*" style="display:none" onchange="handleFiles(this.files); this.value=''">
        <input type="file" id="image-input" multiple accept="image/*" style="display:none" onchange="handleImages(this.files); this.value=''">
        <input type="file" id="audio-input" multiple accept="audio/*" style="display:none" onchange="handleAudios(this.files); this.value=''">
        
        <button class="btn" onclick="document.getElementById('file-input').click()">+ Import Video</button>
        <button class="btn" onclick="document.getElementById('image-input').click()">+ Import Image</button>
        <button class="btn" style="background:#cc44ff; color:#fff;" onclick="document.getElementById('audio-input').click()">+ Import MP3 / Audio</button>
        <button class="btn btn-dark" onclick="addTextClip()">+ Add Text Overlay</button>
        
        <div style="display: flex; gap: 8px; margin-bottom: 20px;">
            <button class="btn btn-dark" style="flex:1" onclick="togglePlayback()">▶ Play/Pause</button>
        </div>

        <div id="assets-list"></div>
        
        <div style="padding-top: 20px; border-top: 1px solid var(--border);">
            <div class="section-title">Properties</div>
            <div id="props-panel" style="display:none;">
                <div id="media-props">
                    <div class="prop-group">
                        <label>File Path</label>
                        <input type="text" id="p-path" oninput="updateClip()">
                    </div>
                    <div class="prop-group" id="srcstart-group">
                        <label>Start in Source (s)</label>
                        <input type="number" id="p-srcstart" step="0.1" oninput="updateClip()">
                    </div>
                    <div class="prop-row">
                        <div class="prop-group">
                            <label>Scale (%)</label>
                            <input type="number" id="p-scale" step="0.01" oninput="updateClip()">
                        </div>
                        <div class="prop-group" id="vol-group">
                            <label>Volume (0-2)</label>
                            <input type="number" id="p-volume" step="0.1" oninput="updateClip()">
                        </div>
                    </div>
                    <div class="prop-group">
                        <label>Fit Mode</label>
                        <div style="display:flex; gap:6px;">
                            <button id="btn-fit" class="btn btn-dark btn-small" style="flex:1; padding:6px 4px; font-size:11px;" onclick="setFitMode('fit')">⬜ Fit</button>
                            <button id="btn-stretch" class="btn btn-dark btn-small" style="flex:1; padding:6px 4px; font-size:11px;" onclick="setFitMode('stretch')">⬛ Stretch</button>
                        </div>
                    </div>
                </div>

                <div id="audio-props" style="display:none;">
                    <div class="prop-group">
                        <label>File Path</label>
                        <input type="text" id="p-audio-path" oninput="updateClip()">
                    </div>
                    <div class="prop-row">
                        <div class="prop-group">
                            <label>Volume (0-2)</label>
                            <input type="number" id="p-audio-volume" step="0.1" min="0" max="2" oninput="updateClip()">
                        </div>
                        <div class="prop-group">
                            <label>Start in Source (s)</label>
                            <input type="number" id="p-audio-srcstart" step="0.1" min="0" oninput="updateClip()">
                        </div>
                    </div>
                    <div class="prop-row">
                        <div class="prop-group">
                            <label>Fade In (s)</label>
                            <input type="number" id="p-audio-fadein" step="0.1" min="0" oninput="updateClip()">
                        </div>
                        <div class="prop-group">
                            <label>Fade Out (s)</label>
                            <input type="number" id="p-audio-fadeout" step="0.1" min="0" oninput="updateClip()">
                        </div>
                    </div>
                </div>

                <div id="text-props" style="display:none;">
                    <div class="prop-group">
                        <label>Text Content</label>
                        <input type="text" id="p-text-content" oninput="updateClip()">
                    </div>
                    <div class="prop-group">
                        <label>Font File Path</label>
                        <input type="text" id="p-text-font" oninput="updateClip()">
                    </div>
                    <div class="prop-row">
                        <div class="prop-group">
                            <label>Font Size (px)</label>
                            <input type="number" id="p-text-size" step="1" oninput="updateClip()">
                        </div>
                        <div class="prop-group">
                            <label>Color (Hex)</label>
                            <input type="text" id="p-text-color" oninput="updateClip()">
                        </div>
                    </div>
                </div>

                <div class="prop-group">
                    <label>Duration (s)</label>
                    <input type="number" id="p-duration" step="0.1" oninput="updateClip()">
                </div>
                <div class="prop-row">
                    <div class="prop-group">
                        <label>Pos X (px)</label>
                        <input type="number" id="p-x" step="1" oninput="updateClip()">
                    </div>
                    <div class="prop-group">
                        <label>Pos Y (px)</label>
                        <input type="number" id="p-y" step="1" oninput="updateClip()">
                    </div>
                </div>
                <div id="fade-props" class="prop-row">
                    <div class="prop-group">
                        <label>Fade In (s)</label>
                        <input type="number" id="p-fadein" step="0.1" oninput="updateClip()">
                    </div>
                    <div class="prop-group">
                        <label>Fade Out (s)</label>
                        <input type="number" id="p-fadeout" step="0.1" oninput="updateClip()">
                    </div>
                </div>
                <div style="display: flex; gap: 8px; margin-top: 20px;">
                    <button class="btn btn-dark btn-small" onclick="moveLayer(-1)">⬇ Lower</button>
                    <button class="btn btn-dark btn-small" onclick="moveLayer(1)">⬆ Raise</button>
                    <button class="btn btn-dark btn-small" onclick="splitClip()">Split</button>
                </div>
                <button class="btn btn-danger" style="margin-top:10px" onclick="deleteClip()">Delete Clip</button>
            </div>
        </div>
    </div>

    <div id="main">
        <div id="viewport-container"></div>
        <div id="prompt-box">
            <div id="prompt-text">Import videos or add text to generate command...</div>
            <button class="btn copy-btn" onclick="copyPrompt()">Copy Command</button>
        </div>
        <div id="timeline">
            <div class="section-title">Timeline (20px = 1s) | Click to Seek</div>
            <div id="timeline-scroll-container">
                <div id="timeline-ruler"></div>
                <div id="tracks-area">
                    <div class="grid-line"></div>
                    <div id="playhead"></div>
                </div>
            </div>
        </div>
    </div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
    </script>

    <script type="module">
        import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';

        window.addEventListener('keydown', (e) => {
            if (document.activeElement.tagName === 'INPUT') return;

            if (e.key.toLowerCase() === 'm') {
                const box = document.getElementById('prompt-box');
                box.style.display = (box.style.display === 'none') ? 'block' : 'none';
            }

            if (e.code === 'Space' || e.key === ' ') {
                e.preventDefault();
                window.togglePlayback();
            }

            if (e.key.toLowerCase() === 's') {
                window.splitClip();
            }

            if (e.key === 'Delete' || e.key === 'Backspace') {
                window.deleteClip();
            }

            // Ctrl+C — copy selected clip
            if (e.key.toLowerCase() === 'c' && (e.ctrlKey || e.metaKey)) {
                window.copyClip();
            }

            // Ctrl+V — paste clipboard clip at current playhead position
            if (e.key.toLowerCase() === 'v' && (e.ctrlKey || e.metaKey)) {
                e.preventDefault();
                window.pasteClip();
            }
        });

        const PROJECT = { w: 1920, h: 1080, aspect: 16/9, pxPerSec: 20 };
        let state = { clips: [], selectedIdx: null, isPlaying: false, time: 0 };
        let clipboard = null; // stores a deep copy of the last copied clip

        const scene = new THREE.Scene();
        const camera = new THREE.OrthographicCamera(-PROJECT.w/2, PROJECT.w/2, PROJECT.h/2, -PROJECT.h/2, 0.1, 1000);
        camera.position.z = 10;

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        const viewport = document.getElementById('viewport-container');
        viewport.appendChild(renderer.domElement);

        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        function fitCanvas() {
            const cw = viewport.clientWidth, ch = viewport.clientHeight;
            let w = cw, h = cw / PROJECT.aspect;
            if (h > ch) { h = ch; w = ch * PROJECT.aspect; }
            renderer.setSize(w, h);
        }
        window.addEventListener('resize', fitCanvas);
        fitCanvas();

        scene.add(new THREE.Mesh(new THREE.PlaneGeometry(PROJECT.w, PROJECT.h), new THREE.MeshBasicMaterial({ color: 0x000000 })));

        const handleGeometry = new THREE.PlaneGeometry(20, 20);
        const handleMaterial = new THREE.MeshBasicMaterial({ color: 0x00ff88 });
        const handleMesh = new THREE.Mesh(handleGeometry, handleMaterial);
        handleMesh.visible = false;
        scene.add(handleMesh);

        function updateLayering() {
            state.clips.forEach((clip, i) => {
                clip.mesh.position.z = i * 0.1 + 1;
            });
        }

        function calculateOpacity(clip) {
            const relativeTime = state.time - clip.timelineStart;
            if (relativeTime < 0 || relativeTime > clip.duration) return 0;
            let opacity = 1.0;
            if (clip.fadeIn > 0 && relativeTime < clip.fadeIn) {
                opacity = relativeTime / clip.fadeIn;
            } else if (clip.fadeOut > 0 && relativeTime > (clip.duration - clip.fadeOut)) {
                const timeIntoFadeOut = relativeTime - (clip.duration - clip.fadeOut);
                opacity = 1.0 - (timeIntoFadeOut / clip.fadeOut);
            }
            return Math.max(0, Math.min(1, opacity));
        }

        function createTextTexture(text, size, color) {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            
            // 1. Definir fonte primeiro para medir o texto
            ctx.font = `bold ${size}px Arial`;
            const metrics = ctx.measureText(text);
            
            // 2. Definir tamanho do canvas com uma folga (padding) 
            // para a borda não ser cortada nas extremidades
            const padding = 10; 
            canvas.width = Math.ceil(metrics.width) + padding * 2;
            canvas.height = Math.ceil(size * 1.5);
            
            // 3. Re-configurar a fonte e alinhamentos ANTES de desenhar
            ctx.font = `bold ${size}px Arial`;
            ctx.textBaseline = 'middle';
            ctx.textAlign = 'left';

            // Coordenadas fixas para ambos (X = padding, Y = centro do canvas)
            const x = padding;
            const y = canvas.height / 2;

            // 4. Desenhar a BORDA primeiro
            ctx.strokeStyle = 'black';
            ctx.lineWidth = 3;
            ctx.lineJoin = 'round';
            ctx.strokeText(text, x, y);

            // 5. Desenhar o PREENCHIMENTO por cima da borda
            ctx.fillStyle = color;
            ctx.fillText(text, x, y);

            const tex = new THREE.CanvasTexture(canvas);
            return tex;
        }

        function computeGeometry(nativeW, nativeH, fitMode) {
            if (fitMode === 'stretch') {
                return new THREE.PlaneGeometry(PROJECT.w, PROJECT.h);
            }
            // 'fit': scale to fit inside canvas keeping native aspect ratio
            const s = Math.min(PROJECT.w / nativeW, PROJECT.h / nativeH);
            return new THREE.PlaneGeometry(nativeW * s, nativeH * s);
        }

        window.setFitMode = function(mode) {
            if (state.selectedIdx === null) return;
            const clip = state.clips[state.selectedIdx];
            clip.fitMode = mode;
            clip.mesh.geometry = computeGeometry(clip.nativeW, clip.nativeH, mode);
            const btnFit = document.getElementById('btn-fit');
            const btnStretch = document.getElementById('btn-stretch');
            btnFit.style.background = mode === 'fit' ? 'var(--accent)' : '#333';
            btnFit.style.color = mode === 'fit' ? '#000' : '#fff';
            btnStretch.style.background = mode === 'stretch' ? 'var(--accent)' : '#333';
            btnStretch.style.color = mode === 'stretch' ? '#000' : '#fff';
            generateFFmpeg();
        };

        window.handleFiles = function(files) {
            Array.from(files).forEach(file => {
                const video = document.createElement('video');
                video.src = URL.createObjectURL(file);
                video.muted = false;
                video.loop = true;
                video.crossOrigin = "anonymous";

                const tex = new THREE.VideoTexture(video);
                const clip = {
                    id: Date.now() + Math.random(),
                    type: 'video',
                    path: file.name,
                    timelineStart: state.time,
                    sourceStart: 0,
                    duration: 5,
                    scale: 1.0,
                    volume: 1.0,
                    fadeIn: 0,
                    fadeOut: 0,
                    fitMode: 'stretch',
                    nativeW: PROJECT.w,
                    nativeH: PROJECT.h,
                    mesh: null, video, texture: tex
                };

                const mesh = new THREE.Mesh(
                    computeGeometry(clip.nativeW, clip.nativeH, clip.fitMode),
                    new THREE.MeshBasicMaterial({ map: tex, side: THREE.DoubleSide, transparent: true })
                );
                mesh.visible = false;
                scene.add(mesh);
                clip.mesh = mesh;

                video.addEventListener('loadedmetadata', () => {
                    clip.nativeW = video.videoWidth || PROJECT.w;
                    clip.nativeH = video.videoHeight || PROJECT.h;
                    clip.mesh.geometry = computeGeometry(clip.nativeW, clip.nativeH, clip.fitMode);
                }, { once: true });

                state.clips.push(clip);
            });
            updateLayering();
            syncUI();
            generateFFmpeg();
        };

        window.handleImages = function(files) {
            Array.from(files).forEach(file => {
                const url = URL.createObjectURL(file);
                const img = new Image();
                const clip = {
                    id: Date.now() + Math.random(),
                    type: 'image',
                    path: file.name,
                    timelineStart: state.time,
                    duration: 5,
                    scale: 1.0,
                    fadeIn: 0,
                    fadeOut: 0,
                    fitMode: 'stretch',
                    nativeW: PROJECT.w,
                    nativeH: PROJECT.h,
                    mesh: null, texture: null
                };

                img.onload = () => {
                    clip.nativeW = img.naturalWidth;
                    clip.nativeH = img.naturalHeight;
                    clip.mesh.geometry = computeGeometry(clip.nativeW, clip.nativeH, clip.fitMode);
                };
                img.src = url;

                const tex = new THREE.TextureLoader().load(url);
                const mesh = new THREE.Mesh(
                    computeGeometry(clip.nativeW, clip.nativeH, clip.fitMode),
                    new THREE.MeshBasicMaterial({ map: tex, side: THREE.DoubleSide, transparent: true })
                );
                mesh.visible = false;
                scene.add(mesh);
                clip.mesh = mesh;
                clip.texture = tex;

                state.clips.push(clip);
            });
            updateLayering();
            syncUI();
            generateFFmpeg();
        };

        window.handleAudios = function(files) {
            Array.from(files).forEach(file => {
                const url = URL.createObjectURL(file);
                const audio = document.createElement('audio');
                audio.src = url;
                audio.preload = 'metadata';

                const clip = {
                    id: Date.now() + Math.random(),
                    type: 'audio',
                    path: file.name,
                    timelineStart: state.time,
                    duration: 10,
                    sourceStart: 0,
                    volume: 1.0,
                    fadeIn: 0,
                    fadeOut: 0,
                    audio,
                    // Audio clips need a dummy mesh (invisible) just to satisfy the lane system
                    mesh: { position: { x: 0, y: 0, z: 0 }, visible: false, scale: { set: () => {} } }
                };

                audio.addEventListener('loadedmetadata', () => {
                    clip.duration = audio.duration;
                    syncUI();
                    generateFFmpeg();
                }, { once: true });

                state.clips.push(clip);
            });
            syncUI();
            generateFFmpeg();
        };

        window.addTextClip = function() {
            const text = "Novo Texto";
            const size = 60;
            const color = "#FFFF00";
            const fontPath = "C\\:/Windows/Fonts/arial.ttf";
            const tex = createTextTexture(text, size, color);
            const mesh = new THREE.Mesh(
                new THREE.PlaneGeometry(tex.image.width, tex.image.height), 
                new THREE.MeshBasicMaterial({ map: tex, transparent: true, side: THREE.DoubleSide })
            );
            mesh.visible = false;
            scene.add(mesh);

            state.clips.push({
                id: Date.now() + Math.random(),
                type: 'text',
                text: text,
                fontSize: size,
                textColor: color,
                fontPath: fontPath,
                borderW: 3,
                borderC: 'black',
                timelineStart: state.time, 
                duration: 5,
                fadeIn: 0,
                fadeOut: 0,
                mesh, texture: tex
            });
            updateLayering();
            syncUI();
            generateFFmpeg();
        };

        let activeClip = null; 
        let isDragging = false; 
        let isResizing = false; 
        let isViewportDragging = false; 
        let isViewportResizing = false; 
        let viewportActiveClip = null; 
        let dragOffset = 0;

        const trackArea = document.getElementById('tracks-area');

        renderer.domElement.addEventListener('mousedown', e => {
            const rect = renderer.domElement.getBoundingClientRect();
            mouse.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
            mouse.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);
            const handleIntersect = raycaster.intersectObject(handleMesh);
            if (handleIntersect.length > 0 && viewportActiveClip) {
                isViewportResizing = true;
                e.preventDefault();
                return;
            }
            const intersects = raycaster.intersectObjects(state.clips.map(c => c.mesh));
            if (intersects.length > 0) {
                let hitMesh = (state.selectedIdx !== null && intersects.find(item => item.object === state.clips[state.selectedIdx].mesh)) 
                    ? state.clips[state.selectedIdx].mesh : intersects[0].object;
                viewportActiveClip = state.clips.find(c => c.mesh === hitMesh);
                isViewportDragging = true;
                selectClip(state.clips.indexOf(viewportActiveClip));
                renderer.domElement.style.cursor = 'grabbing';
                e.preventDefault();
            }
        });

        trackArea.addEventListener('mousedown', e => {
            const rect = trackArea.getBoundingClientRect();
            if (e.target.classList.contains('resizer')) {
                isResizing = true;
                activeClip = state.clips.find(c => c.id == e.target.dataset.id);
                e.stopPropagation(); return;
            }
            if (e.target.classList.contains('clip-block')) {
                isDragging = true;
                const id = e.target.dataset.id;
                activeClip = state.clips.find(c => c.id == id);
                dragOffset = e.clientX - (rect.left + activeClip.timelineStart * PROJECT.pxPerSec);
                selectClip(state.clips.indexOf(activeClip)); return;
            }
            state.time = (e.clientX - rect.left) / PROJECT.pxPerSec;
            updatePlayhead();
            syncVideos();
        });

        window.addEventListener('mousemove', e => {
            if (isViewportResizing && viewportActiveClip) {
                const rect = renderer.domElement.getBoundingClientRect();
                const mouseX = ((e.clientX - rect.left) / rect.width) * 2 - 1;
                const mouseY = -((e.clientY - rect.top) / rect.height) * 2 + 1;
                const worldX = mouseX * (PROJECT.w / 2);
                const worldY = mouseY * (PROJECT.h / 2);
                const dx = worldX - viewportActiveClip.mesh.position.x;
                const dy = worldY - viewportActiveClip.mesh.position.y;
                const dist = Math.sqrt(dx*dx + dy*dy);
                const newScale = dist / (PROJECT.w / 2 * 0.707); 
                viewportActiveClip.scale = Math.max(0.1, newScale);
                viewportActiveClip.mesh.scale.set(viewportActiveClip.scale, viewportActiveClip.scale, 1);
                document.getElementById('p-scale').value = viewportActiveClip.scale.toFixed(2);
                // REMOVIDO generateFFmpeg() daqui para economizar CPU
                return;
            }
            if (isViewportDragging && viewportActiveClip) {
                const rect = renderer.domElement.getBoundingClientRect();
                const deltaX = e.movementX * (PROJECT.w / rect.width);
                const deltaY = e.movementY * (PROJECT.h / rect.height);
                viewportActiveClip.mesh.position.x -= deltaX;
                viewportActiveClip.mesh.position.y += deltaY;
                document.getElementById('p-x').value = Math.round(viewportActiveClip.mesh.position.x);
                document.getElementById('p-y').value = Math.round(viewportActiveClip.mesh.position.y);
                // REMOVIDO generateFFmpeg() daqui para economizar CPU
                return;
            }
            if (!activeClip) return;
            const rect = trackArea.getBoundingClientRect();
            const tolerance = 0.2; 

            if (isDragging) {
                let rawStart = (e.clientX - rect.left - dragOffset) / PROJECT.pxPerSec;
                let snapTarget = null;

                state.clips.forEach(c => {
                    if (c === activeClip) return;
                    const start = c.timelineStart;
                    const end = c.timelineStart + c.duration;
                    if (Math.abs(rawStart - end) < tolerance) snapTarget = end;
                    else if (Math.abs(rawStart - start) < tolerance) snapTarget = start;
                });

                if (snapTarget === null && Math.abs(rawStart - state.time) < tolerance) {
                    snapTarget = state.time;
                }

                activeClip.timelineStart = snapTarget !== null ? snapTarget : Math.max(0, rawStart);
            } else if (isResizing) {
                let rawEnd = (e.clientX - rect.left) / PROJECT.pxPerSec;
                let snapEnd = null;

                state.clips.forEach(c => {
                    if (c === activeClip) return;
                    const start = c.timelineStart;
                    const end = c.timelineStart + c.duration;
                    if (Math.abs(rawEnd - end) < tolerance) snapEnd = end;
                    else if (Math.abs(rawEnd - start) < tolerance) snapEnd = start;
                });

                if (snapEnd === null && Math.abs(rawEnd - state.time) < tolerance) {
                    snapEnd = state.time;
                }

                const finalEnd = snapEnd !== null ? snapEnd : rawEnd;
                activeClip.duration = Math.max(0.1, finalEnd - activeClip.timelineStart);
            }
            if (isDragging || isResizing) { syncUI(); } // REMOVIDO generateFFmpeg() daqui
        });

        window.addEventListener('mouseup', () => { 
            isDragging = false; isResizing = false; activeClip = null; 
            isViewportDragging = false; isViewportResizing = false; viewportActiveClip = null;
            renderer.domElement.style.cursor = 'default';
            generateFFmpeg(); // ATUALIZADO: Gera o comando apenas quando termina de arrastar/escalar
        });

        window.updateClip = function() {
            if (state.selectedIdx === null) return;
            const clip = state.clips[state.selectedIdx];
            
            const updateIfValid = (id, prop, isInt = false) => {
                const val = document.getElementById(id).value;

                    clip[prop] = isInt ? parseInt(val) : parseFloat(val);

                }
                return false;

        window.moveLayer = function(dir) {
            if (state.selectedIdx === null) return;
            const newIdx = state.selectedIdx + dir;
            if (newIdx >= 0 && newIdx < state.clips.length) {
                const temp = state.clips[state.selectedIdx];
                state.clips[state.selectedIdx] = state.clips[newIdx];
                state.clips[newIdx] = temp;
                state.selectedIdx = newIdx;

                generateFFmpeg();

        window.splitClip = function() {
            if (state.selectedIdx === null) return;
            const clip = state.clips[state.selectedIdx];
            if (state.time > clip.timelineStart && state.time < (clip.timelineStart + clip.duration)) {
                const splitTime = state.time;
                const offsetFromStart = splitTime - clip.timelineStart;
                const originalDuration = clip.duration;
                clip.duration = offsetFromStart;
                const newClipDuration = originalDuration - clip.duration;
                
                let newMesh;
                if (clip.type === 'video') {
                    const video = document.createElement('video');
                    video.src = clip.video.src;
                    video.muted = false; video.loop = true;
                    const tex = new THREE.VideoTexture(video);
                    newMesh = new THREE.Mesh(computeGeometry(clip.nativeW, clip.nativeH, clip.fitMode), new THREE.MeshBasicMaterial({ map: tex, side: THREE.DoubleSide, transparent: true }));
                    newMesh.visible = false;
                    newMesh.position.set(clip.mesh.position.x, clip.mesh.position.y, 0);
                    newMesh.scale.set(clip.scale, clip.scale, 1);
                    scene.add(newMesh);
                    state.clips.push({
                        id: Date.now() + Math.random(), type: 'video', path: clip.path,
                        timelineStart: splitTime, sourceStart: clip.sourceStart + offsetFromStart,
                        duration: newClipDuration, scale: clip.scale, volume: clip.volume,
                        fadeIn: 0, fadeOut: clip.fadeOut,
                        fitMode: clip.fitMode, nativeW: clip.nativeW, nativeH: clip.nativeH,
                        mesh: newMesh, video, texture: tex
                    });
                } else if (clip.type === 'image') {
                    const tex = clip.texture;
                    newMesh = new THREE.Mesh(computeGeometry(clip.nativeW, clip.nativeH, clip.fitMode), new THREE.MeshBasicMaterial({ map: tex, side: THREE.DoubleSide, transparent: true }));
                    newMesh.visible = false;
                    newMesh.position.set(clip.mesh.position.x, clip.mesh.position.y, 0);
                    newMesh.scale.set(clip.scale, clip.scale, 1);
                    scene.add(newMesh);
                    state.clips.push({
                        id: Date.now() + Math.random(), type: 'image', path: clip.path,
                        timelineStart: splitTime, duration: newClipDuration, scale: clip.scale,
                        fadeIn: 0, fadeOut: clip.fadeOut,
                        fitMode: clip.fitMode, nativeW: clip.nativeW, nativeH: clip.nativeH,
                        mesh: newMesh, texture: tex
                    });
                } else if (clip.type === 'audio') {
                    const newAudio = document.createElement('audio');
                    newAudio.src = clip.audio.src;
                    state.clips.push({
                        id: Date.now() + Math.random(), type: 'audio', path: clip.path,
                        timelineStart: splitTime,
                        sourceStart: clip.sourceStart + offsetFromStart,
                        duration: newClipDuration,
                        volume: clip.volume,
                        fadeIn: 0, fadeOut: clip.fadeOut,
                        audio: newAudio,
                        mesh: { position: { x: 0, y: 0, z: 0 }, visible: false, scale: { set: () => {} } }
                    });
                } else {
                    const tex = createTextTexture(clip.text, clip.fontSize, clip.textColor);
                    newMesh = new THREE.Mesh(new THREE.PlaneGeometry(tex.image.width, tex.image.height), new THREE.MeshBasicMaterial({ map: tex, transparent: true, side: THREE.DoubleSide }));
                    newMesh.visible = false;
                    scene.add(newMesh);
                    state.clips.push({
                        id: Date.now() + Math.random(), type: 'text', text: clip.text,
                        fontSize: clip.fontSize, textColor: clip.textColor, fontPath: clip.fontPath,
                        timelineStart: splitTime, duration: newClipDuration, fadeIn: 0, fadeOut: clip.fadeOut, mesh: newMesh, texture: tex
                    });
                }

                const newIndex = state.clips.length - 1;
                selectClip(newIndex);

                updateLayering();
                syncUI();
                generateFFmpeg();
            }
        };

        function renderRuler() {
            const ruler = document.getElementById('timeline-ruler');
            ruler.innerHTML = '';
            let maxTime = 30; 
            if (state.clips.length > 0) {
                maxTime = Math.max(30, Math.max(...state.clips.map(c => c.timelineStart + c.duration)) + 10);
            }
            const totalWidth = maxTime * PROJECT.pxPerSec;
            ruler.style.width = `${totalWidth}px`;
            trackArea.style.width = `${totalWidth}px`;
            for (let i = 0; i <= maxTime; i++) {
                const tick = document.createElement('div');
                tick.className = `ruler-tick ${i % 5 === 0 ? 'major' : ''}`;
                tick.style.left = `${i * PROJECT.pxPerSec}px`;
                tick.innerText = i % 5 === 0 ? `${i}s` : '';
                ruler.appendChild(tick);
            }
        }

        // Assign each clip a lane (row) using greedy interval packing.
        // Clips that don't overlap in time share the same lane.
        function assignLanes(clips) {
            // laneEnd[lane] = the end time of the last clip placed in that lane
            const laneEnd = [];
            const lanes = new Array(clips.length).fill(0);
            clips.forEach((clip, i) => {
                const start = clip.timelineStart;
                const end = start + clip.duration;
                // Find the first lane whose last clip has already ended (with 0.05s gap tolerance)
                let placed = false;
                for (let l = 0; l < laneEnd.length; l++) {
                    if (laneEnd[l] <= start + 0.05) {
                        lanes[i] = l;
                        laneEnd[l] = end;
                        placed = true;
                        break;
                    }
                }
                if (!placed) {
                    lanes[i] = laneEnd.length;
                    laneEnd.push(end);
                }
            });
            return lanes;
        }

        function syncUI() {
            const list = document.getElementById('assets-list');
            list.innerHTML = '';
            trackArea.querySelectorAll('.clip-block').forEach(c => c.remove());

            const lanes = assignLanes(state.clips);
            const totalLanes = lanes.length > 0 ? Math.max(...lanes) + 1 : 1;

            state.clips.forEach((clip, i) => {
                const item = document.createElement('div');
                item.className = `asset-item ${state.selectedIdx === i ? 'active' : ''}`;
                item.innerText = clip.type === 'video' ? `[Vid] ${clip.path}` : (clip.type === 'image' ? `[Img] ${clip.path}` : (clip.type === 'audio' ? `[Aud] ${clip.path}` : `[Txt] ${clip.text}`));
                item.onclick = () => selectClip(i);
                list.appendChild(item);
                const block = document.createElement('div');
                block.className = `clip-block ${clip.type === 'text' ? 'text-type' : (clip.type === 'image' ? 'image-type' : (clip.type === 'audio' ? 'audio-type' : ''))}`;
                if (state.selectedIdx === i) block.classList.add('selected');
                block.dataset.id = clip.id;
                block.style.top = `${lanes[i] * 32 + 4}px`;
                block.style.left = `${clip.timelineStart * PROJECT.pxPerSec}px`;
                block.style.width = `${clip.duration * PROJECT.pxPerSec}px`;
                block.innerText = clip.type === 'audio' ? `🎵 ${clip.path}` : (clip.type === 'video' ? clip.path : (clip.type === 'image' ? clip.path : clip.text));
                const res = document.createElement('div');
                res.className = 'resizer';
                res.dataset.id = clip.id;
                block.appendChild(res);
                trackArea.appendChild(block);
            });
            renderRuler();
            document.getElementById('playhead').style.height = `${totalLanes * 32 + 20}px`;
        }

        function syncVideos() {
            state.clips.forEach(clip => {
                const active = state.time >= clip.timelineStart && state.time <= (clip.timelineStart + clip.duration);
                if (clip.type !== 'audio') clip.mesh.visible = active;
                if (active) {
                    if(clip.type === 'video') {
                        clip.video.currentTime = (state.time - clip.timelineStart) + clip.sourceStart;
                        clip.video.volume = Math.min(1, clip.volume);
                        if (!state.isPlaying) clip.video.pause();
                    }
                    if(clip.type === 'audio') {
                        clip.audio.currentTime = (state.time - clip.timelineStart) + clip.sourceStart;
                        clip.audio.volume = Math.min(1, clip.volume);
                        if (!state.isPlaying) clip.audio.pause();
                    }
                    if (clip.type !== 'audio') clip.mesh.material.opacity = calculateOpacity(clip); 
                } else {
                    if(clip.type === 'video') clip.video.pause();
                    if(clip.type === 'audio') clip.audio.pause();
                }
            });
        }

        function updatePlayhead() {
            document.getElementById('playhead').style.left = `${state.time * PROJECT.pxPerSec}px`;
        }

        window.togglePlayback = function() {
            state.isPlaying = !state.isPlaying;
            state.clips.forEach(c => {
                if(c.type === 'video') {
                    const active = state.time >= c.timelineStart && state.time <= (c.timelineStart + c.duration);
                    if (active) state.isPlaying ? c.video.play() : c.video.pause();
                }
                if(c.type === 'audio') {
                    const active = state.time >= c.timelineStart && state.time <= (c.timelineStart + c.duration);
                    if (active) {
                        if (state.isPlaying) {
                            c.audio.currentTime = (state.time - c.timelineStart) + c.sourceStart;
                            c.audio.play();
                        } else {
                            c.audio.pause();
                        }
                    }
                }
            });
        }

        function generateFFmpeg() {
            if (state.clips.length === 0) {
                document.getElementById('prompt-text').innerText = "Import videos or add text to generate command...";
                return;
            }

            let inputCounter = 0;
            let audioCounter = 0; 
            let inputs = "";
            let totalT = 0;

            state.clips.forEach(clip => {
                if (clip.type === 'video' || clip.type === 'image') {
                    clip.inputIndex = inputCounter++; 
                    const ssFlag = (clip.type === 'video' && clip.sourceStart > 0) ? `-ss ${clip.sourceStart} ` : ``;
                    inputs += (clip.type === 'image' ? `-loop 1 ` : ``) + `${ssFlag}-i "${clip.path}" `;
                } else if (clip.type === 'audio') {
                    clip.inputIndex = inputCounter++;
                    const ssFlag = clip.sourceStart > 0 ? `-ss ${clip.sourceStart} ` : ``;
                    inputs += `${ssFlag}-i "${clip.path}" `;
                } else {
                    clip.inputIndex = null; 
                }
                totalT = Math.max(totalT, clip.timelineStart + clip.duration);
            });

            const layerClipped = state.clips; 
            let vChains = [], aChains = [], ovlChain = "";
            let ovlCounter = 0; // tracks how many overlay steps have been added

            layerClipped.forEach((clip, i) => {
                const globalStart = clip.timelineStart;
                const globalEnd = clip.timelineStart + clip.duration;
                
                if (clip.type === 'video' || clip.type === 'image') {
                    const vIn = `[${clip.inputIndex}:v]`, vP = `[v${i}]`;
                    const duration = clip.duration;
                    const fadeInTime = Math.min(clip.fadeIn, duration);
                    const fadeOutTime = Math.min(clip.fadeOut, duration);
                    const fadeOutStartGlobal = globalEnd - fadeOutTime;

                    let vFilter = "";
                    if (clip.type === 'video') {
                        vFilter = `trim=start=0:duration=${duration},setpts=PTS-STARTPTS`;
                        vFilter += `,setpts=PTS+${globalStart}/TB`;
                    } else {
                        vFilter = `setpts=PTS-STARTPTS,setpts=PTS+${globalStart}/TB`;
                    }

                    const isFit = (clip.fitMode || 'fit') === 'fit';
                    let finalW, finalH;
                    if (isFit && clip.nativeW && clip.nativeH) {
                        const s = Math.min(PROJECT.w / clip.nativeW, PROJECT.h / clip.nativeH) * clip.scale;
                        finalW = clip.nativeW * s;
                        finalH = clip.nativeH * s;
                    } else {
                        finalW = PROJECT.w * clip.scale;
                        finalH = PROJECT.h * clip.scale;
                    }
                    let overlayX = 0;
                    let overlayY = 0;

                    if (clip.scale > 4) {
                        if (isFit && clip.nativeW && clip.nativeH) {
                            vFilter += `,scale=${PROJECT.w}:${PROJECT.h}:force_original_aspect_ratio=decrease,pad=${PROJECT.w}:${PROJECT.h}:(ow-iw)/2:(oh-ih)/2`;
                        } else {
                            vFilter += `,scale=${PROJECT.w}:${PROJECT.h}`;
                        }
                        const cropW = Math.round(PROJECT.w / clip.scale);
                        const cropH = Math.round(PROJECT.h / clip.scale);
                        let cropX = Math.round((PROJECT.w / 2) - (clip.mesh.position.x / clip.scale) - (cropW / 2));
                        let cropY = Math.round((PROJECT.h / 2) + (clip.mesh.position.y / clip.scale) - (cropH / 2));
                        cropX = Math.max(0, Math.min(cropX, PROJECT.w - cropW));
                        cropY = Math.max(0, Math.min(cropY, PROJECT.h - cropH));
                        vFilter += `,crop=${cropW}:${cropH}:${cropX}:${cropY},scale=${PROJECT.w}:${PROJECT.h}`;
                        overlayX = 0;
                        overlayY = 0;
                    } else {
                        if (isFit && clip.nativeW && clip.nativeH) {
                            vFilter += `,scale=${Math.round(finalW)}:${Math.round(finalH)}:force_original_aspect_ratio=decrease`;
                        } else {
                            vFilter += `,scale=${Math.round(finalW)}:${Math.round(finalH)}`;
                        }
                        overlayX = Math.round(960 + clip.mesh.position.x - finalW / 2);
                        overlayY = Math.round(540 - clip.mesh.position.y - finalH / 2);
                    }

                    if (fadeInTime > 0) vFilter += `,fade=t=in:st=${globalStart}:d=${fadeInTime}`;
                    if (fadeOutTime > 0) vFilter += `,fade=t=out:st=${fadeOutStartGlobal}:d=${fadeOutTime}`;
                    vChains.push(`${vIn}${vFilter}${vP}`);

                    const prev = ovlCounter === 0 ? `[bg]` : `[ovl${ovlCounter-1}]`;
                    const next = `[ovl${ovlCounter}]`;
                    ovlChain += `${prev}[v${i}]overlay=${overlayX}:${overlayY}:enable='between(t,${globalStart},${globalEnd})'${next},`;
                    ovlCounter++;

                    if (clip.type === 'video') {
                        const aIn = `[${clip.inputIndex}:a]`;
                        const aP = `[a${audioCounter}]`;
                        const delayMs = Math.round(clip.timelineStart * 1000);
                        let aFilter = `atrim=start=0:duration=${duration},asetpts=PTS-STARTPTS`;
                        aFilter += `,asetpts=PTS+${globalStart}/TB`;
                        if (fadeInTime > 0) aFilter += `,afade=t=in:st=${globalStart}:d=${fadeInTime}`;
                        if (fadeOutTime > 0) aFilter += `,afade=t=out:st=${fadeOutStartGlobal}:d=${fadeOutTime}`;
                        aFilter += `,volume=${clip.volume},adelay=${delayMs}|${delayMs},aresample=44100`;
                        aChains.push(`${aIn}${aFilter}${aP}`);
                        audioCounter++;
                    }
                } else if (clip.type === 'audio') {
                    // Standalone audio clip — only audio chain, no overlay
                    const aIn = `[${clip.inputIndex}:a]`;
                    const aP = `[a${audioCounter}]`;
                    const delayMs = Math.round(clip.timelineStart * 1000);
                    const fadeInTime = Math.min(clip.fadeIn || 0, clip.duration);
                    const fadeOutTime = Math.min(clip.fadeOut || 0, clip.duration);
                    const fadeOutStartGlobal = globalEnd - fadeOutTime;
                    let aFilter = `atrim=start=0:duration=${clip.duration},asetpts=PTS-STARTPTS`;
                    aFilter += `,asetpts=PTS+${globalStart}/TB`;
                    if (fadeInTime > 0) aFilter += `,afade=t=in:st=${globalStart}:d=${fadeInTime}`;
                    if (fadeOutTime > 0) aFilter += `,afade=t=out:st=${fadeOutStartGlobal}:d=${fadeOutTime}`;
                    aFilter += `,volume=${clip.volume},adelay=${delayMs}|${delayMs},aresample=44100`;
                    aChains.push(`${aIn}${aFilter}${aP}`);
                    audioCounter++;
                } else {
                    // text clip
                    const texW = clip.texture.image.width;
                    const isCenterX = clip.mesh.position.x === 0;
                    const posX = isCenterX ? '(w-tw)/2' : Math.round(960 + clip.mesh.position.x - (texW / 2));
                    const verticalOffset = clip.fontSize * 0.1; 
                    const posY = Math.round(540 - clip.mesh.position.y - (clip.fontSize / 2) + verticalOffset);
                    let finalColor = clip.textColor;
                    if (clip.fadeIn > 0 || clip.fadeOut > 0) {
                        const alphaExpr = `if(lt(t,${globalStart}+${clip.fadeIn}),(t-${globalStart})/${clip.fadeIn},if(lt(t,${globalEnd}-${clip.fadeOut}),1,(${globalEnd}-t)/${clip.fadeOut}))`;
                        finalColor = `${clip.textColor}@${alphaExpr}`;
                    }
                    const prev = ovlCounter === 0 ? `[bg]` : `[ovl${ovlCounter-1}]`;
                    const next = `[ovl${ovlCounter}]`;
                    ovlChain += `${prev}drawtext=text='${clip.text}':fontfile='${clip.fontPath}':x=${posX}:y=${posY}:fontsize=${clip.fontSize}:fontcolor=${finalColor}:borderw=3:bordercolor=black:enable='between(t,${globalStart},${globalEnd})'${next},`;
                    ovlCounter++;
                }
            });

            if (ovlChain.endsWith(',')) ovlChain = ovlChain.slice(0, -1);
            const bg = `color=c=black:s=1920x1080:d=${totalT}[bg]`;
            const finalVString = `${bg};${vChains.join(',')};${ovlChain}`;
            const vOut = ovlCounter > 0 ? `[ovl${ovlCounter - 1}]` : `[bg]`;
            
            // --- CORREÇÃO DO ÁUDIO ---
            // Criamos um fluxo de silêncio absoluto que dura todo o projeto
            const silentBase = `anullsrc=channel_layout=stereo:sample_rate=44100:d=${totalT}[silent]`;
            let finalA = "";
            let aOut = "[outa]";

            if (aChains.length > 0) {
                // Listamos o silêncio + todos os vídeos: [silent][a0][a1]...
                const audioLabels = `[silent]` + Array.from({length: audioCounter}, (_, i) => `[a${i}]`).join('');
                // Mixamos todos eles. O número de inputs é audioCounter + 1 (por causa do silêncio)
                finalA = `${silentBase};${aChains.join(',')};${audioLabels}amix=inputs=${audioCounter + 1}:duration=longest${aOut}`;
            } else {
                finalA = `${silentBase}`;
                aOut = "[silent]";
            }
            
            document.getElementById('prompt-text').innerText = `ffmpeg ${inputs} -filter_complex "${finalVString};${finalA}" -map "${vOut}" -map "${aOut}" -t ${totalT} -c:v libx264 -c:a aac -movflags +faststart output.mp4`;
        }


        window.copyPrompt = function() {
            navigator.clipboard.writeText(document.getElementById('prompt-text').innerText);
            const b = document.querySelector('.copy-btn');
            b.innerText = 'Copiado!';
            setTimeout(() => b.innerText = 'Copy Command', 2000);
        };

        const clock = new THREE.Clock();
        function animate() {
            requestAnimationFrame(animate);
            if (state.selectedIdx !== null) {
                const clip = state.clips[state.selectedIdx];
                if (clip.type !== 'audio' && clip.scale !== undefined) {
                    handleMesh.visible = true;
                    handleMesh.position.x = clip.mesh.position.x + (PROJECT.w / 2 * clip.scale);
                    handleMesh.position.y = clip.mesh.position.y - (PROJECT.h / 2 * clip.scale);
                    handleMesh.position.z = clip.mesh.position.z + 0.1;
                } else {
                    handleMesh.visible = false;
                }
            } else {
                handleMesh.visible = false;
            }

            if (state.isPlaying) {
                state.time += clock.getDelta();
                updatePlayhead();
                let max = 0; 
                state.clips.forEach(c => max = Math.max(max, c.timelineStart + c.duration));
                if (state.time > max) {
                    state.time = 0; state.isPlaying = false;
                    state.clips.forEach(c => { 
                        if(c.type === 'video') {
                            c.video.currentTime = c.sourceStart; 
                            c.video.pause();
                        }
                        if(c.type === 'audio') {
                            c.audio.currentTime = c.sourceStart;
                            c.audio.pause();
                        }
                    });
                } else {
                    state.clips.forEach(clip => {
                        const active = state.time >= clip.timelineStart && state.time <= (clip.timelineStart + clip.duration);
                        if (clip.type !== 'audio') clip.mesh.visible = active;
                        if (active) {
                            if (clip.type !== 'audio') clip.mesh.material.opacity = calculateOpacity(clip);
                            if(clip.type === 'video') {
                                if (clip.video.paused) {
                                    clip.video.currentTime = (state.time - clip.timelineStart) + clip.sourceStart;
                                    clip.video.play();
                                }
                            }
                            if(clip.type === 'audio') {
                                if (clip.audio.paused) {
                                    clip.audio.currentTime = (state.time - clip.timelineStart) + clip.sourceStart;
                                    clip.audio.volume = Math.min(1, clip.volume);
                                    clip.audio.play();
                                }
                            }
                        } else {
                            if(clip.type === 'video') clip.video.pause();
                            if(clip.type === 'audio') clip.audio.pause();
                        }
                    });
                }
            }
            renderer.render(scene, camera);
        }
        animate();
    </script>
